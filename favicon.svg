<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Linen background -->
  <rect width="32" height="32" rx="6" fill="#F0E6D3"/>
  <!-- Coral L-bracket corners -->
  <!-- top-left -->
  <line x1="3.5" y1="3.5" x2="9"   y2="3.5" stroke="#CC3300" stroke-width="2" stroke-linecap="round"/>
  <line x1="3.5" y1="3.5" x2="3.5" y2="9"   stroke="#CC3300" stroke-width="2" stroke-linecap="round"/>
  <!-- top-right -->
  <line x1="28.5" y1="3.5" x2="23"   y2="3.5" stroke="#CC3300" stroke-width="2" stroke-linecap="round"/>
  <line x1="28.5" y1="3.5" x2="28.5" y2="9"   stroke="#CC3300" stroke-width="2" stroke-linecap="round"/>
  <!-- bottom-left -->
  <line x1="3.5" y1="28.5" x2="3.5" y2="23"   stroke="#CC3300" stroke-width="2" stroke-linecap="round"/>
  <line x1="3.5" y1="28.5" x2="9"   y2="28.5" stroke="#CC3300" stroke-width="2" stroke-linecap="round"/>
  <!-- bottom-right -->
  <line x1="28.5" y1="28.5" x2="28.5" y2="23"   stroke="#CC3300" stroke-width="2" stroke-linecap="round"/>
  <line x1="28.5" y1="28.5" x2="23"   y2="28.5" stroke="#CC3300" stroke-width="2" stroke-linecap="round"/>
  <!-- Green cross-stitch X -->
  <line x1="9" y1="9" x2="23" y2="23" stroke="#4A6741" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="23" y1="9" x2="9"  y2="23" stroke="#4A6741" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Hole dots at X corners -->
  <circle cx="9"  cy="9"  r="1.8" fill="#F0E6D3"/>
  <circle cx="23" cy="9"  r="1.8" fill="#F0E6D3"/>
  <circle cx="9"  cy="23" r="1.8" fill="#F0E6D3"/>
  <circle cx="23" cy="23" r="1.8" fill="#F0E6D3"/>
</svg>
