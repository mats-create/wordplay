<style>
/* ═══════════════════════════════════════════════════════════════════
   RESET & TOKENS
═══════════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black:   #1A1A1A;
  --coral:   #CC3300;
  --green:   #4A6741;
  --linen:   #F0E6D3;
  --offwht:  #F5F5F5;
  --grey:    #666666;
  --lgrey:   #CCCCCC;
  --white:   #FFFFFF;
  --surface: #FFFFFF;
  --radius:  12px;
  --radius-sm: 8px;
  --nav-h:   56px;
  --top-h:   56px;
}

html, body, #root {
  height: 100%;
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--offwht);
  color: var(--black);
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--lgrey); border-radius: 2px; }

/* ═══════════════════════════════════════════════════════════════════
   TOP BAR
═══════════════════════════════════════════════════════════════════ */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--top-h);
  background: var(--linen);
  border-bottom: 1px solid rgba(26,26,26,0.12);
  display: flex; align-items: center; padding: 0 16px; gap: 12px;
}
.topbar-wordmark { font-size: 17px; font-weight: 700; color: var(--black); flex: 1; }
.topbar-wordmark span { color: var(--coral); }
.topbar-app-name { font-size: 12px; font-weight: 500; color: var(--grey);
  letter-spacing: 0.5px; text-transform: uppercase; }
.topbar-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover;
  cursor: pointer; border: 2px solid var(--lgrey); transition: border-color 0.15s; }
.topbar-avatar:hover { border-color: var(--coral); }

/* ═══════════════════════════════════════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════════════════════════════════════ */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  height: var(--nav-h);
  background: var(--linen);
  border-top: 1px solid rgba(26,26,26,0.12);
  display: flex;
}
.nav-tab {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px;
  background: none; border: none; cursor: pointer;
  font-family: inherit; font-size: 10px; font-weight: 500;
  color: var(--grey); letter-spacing: 0.3px; text-transform: uppercase;
  transition: color 0.15s; padding: 6px 0;
}
.nav-tab.active { color: var(--coral); }
.nav-tab svg { width: 22px; height: 22px; }
.nav-tab-label { font-size: 10px; }

/* ═══════════════════════════════════════════════════════════════════
   SCREEN LAYOUT
═══════════════════════════════════════════════════════════════════ */
.screen {
  padding: calc(var(--top-h) + 12px) 16px calc(var(--nav-h) + 72px);
  max-width: 640px; margin: 0 auto;
}
.screen-header {
  padding: 12px 0 14px;
  display: flex; align-items: baseline; gap: 8px;
}
.screen-title { font-size: 22px; font-weight: 700; }
.screen-count { font-size: 13px; color: var(--grey); }

/* ═══════════════════════════════════════════════════════════════════
   CARDS GRID
═══════════════════════════════════════════════════════════════════ */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
}
.card {
  background: var(--surface); border: 1px solid var(--lgrey);
  border-radius: var(--radius); padding: 16px;
  cursor: pointer; transition: all 0.15s; position: relative;
}
.card:hover { border-color: var(--black); transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.card-badge {
  position: absolute; top: 12px; right: 12px;
  font-size: 9px; font-weight: 600; letter-spacing: 0.5px;
  text-transform: uppercase; padding: 2px 6px;
  border-radius: 20px; border: 1px solid var(--lgrey); color: var(--grey);
}
.card-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px;
  margin-bottom: 2px; line-height: 1.1; }
.card-sub { font-size: 12px; color: var(--grey); margin-bottom: 10px; line-height: 1.4; }
.card-desc { font-size: 12px; color: var(--grey); line-height: 1.5; margin-bottom: 10px; }
.card-traits { display: flex; gap: 4px; flex-wrap: wrap; }
.trait-chip {
  font-size: 10px; font-weight: 500; padding: 2px 7px;
  border-radius: 20px; border: 1px solid var(--lgrey);
  background: var(--offwht); color: var(--grey);
}
.thread-chips { display: flex; gap: 5px; flex-wrap: wrap; }
.thread-chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 7px;
  border-radius: 20px; border: 1px solid var(--lgrey); background: var(--offwht);
  font-size: 11px; font-weight: 500; }
.thread-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ═══════════════════════════════════════════════════════════════════
   CANVAS
═══════════════════════════════════════════════════════════════════ */
.canvas-thumb { background: var(--linen); border-radius: 6px;
  overflow: hidden; line-height: 0; margin-bottom: 10px; }
.canvas-thumb canvas { display: block; width: 100%; height: auto; }
.canvas-full  { background: var(--linen); border-radius: var(--radius-sm);
  overflow: hidden; line-height: 0; }
.canvas-full canvas { display: block; width: 100%; height: auto; }

/* ═══════════════════════════════════════════════════════════════════
   EMPTY STATE
═══════════════════════════════════════════════════════════════════ */
.empty { text-align: center; padding: 56px 24px; }
.empty-icon { font-size: 52px; opacity: 0.35; display: block; margin-bottom: 14px; }
.empty h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.empty p { font-size: 13px; color: var(--grey); line-height: 1.5;
  max-width: 260px; margin: 0 auto; }

/* ═══════════════════════════════════════════════════════════════════
   FAB
═══════════════════════════════════════════════════════════════════ */
.fab {
  position: fixed; bottom: calc(var(--nav-h) + 16px); right: 20px; z-index: 90;
  width: 52px; height: 52px; border-radius: 14px;
  background: var(--coral); color: var(--white); border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 12px rgba(204,51,0,0.35); transition: all 0.2s;
}
.fab:hover { background: #aa2900; transform: scale(1.05); }
.fab:active { transform: scale(0.97); }
.fab svg { width: 22px; height: 22px; }

/* ═══════════════════════════════════════════════════════════════════
   OVERLAY / SHEET
═══════════════════════════════════════════════════════════════════ */
.overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(26,26,26,0.5);
  display: flex; align-items: flex-end;
  animation: fadeIn 0.15s ease;
}
.overlay-center { align-items: center; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.sheet {
  background: var(--surface); border-radius: 20px 20px 0 0;
  width: 100%; max-width: 640px; margin: 0 auto;
  max-height: 92vh; overflow-y: auto;
  animation: slideUp 0.2s ease;
}
@keyframes slideUp {
  from { transform: translateY(40px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.sheet-handle { width: 36px; height: 4px; border-radius: 2px;
  background: var(--lgrey); margin: 12px auto 0; }
.sheet-header { padding: 14px 18px 12px; display: flex; align-items: center;
  justify-content: space-between; border-bottom: 1px solid var(--offwht); }
.sheet-title { font-size: 16px; font-weight: 700; }
.sheet-body { padding: 18px; }

/* ── Detail sheet ── */
.detail-title { font-size: 36px; font-weight: 700; letter-spacing: -0.8px;
  padding: 16px 18px 2px; line-height: 1.1; }
.detail-meta { font-size: 12px; color: var(--grey); padding: 0 18px 14px;
  border-bottom: 1px solid var(--offwht); line-height: 1.5; }
.detail-section { padding: 14px 18px 0; }
.detail-section-label { font-size: 10px; font-weight: 600; color: var(--grey);
  letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 8px; }
.detail-thread-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.detail-swatch { width: 26px; height: 26px; border-radius: 6px;
  border: 1px solid rgba(0,0,0,0.1); flex-shrink: 0; }
.detail-thread-name { font-size: 13px; font-weight: 500; }
.detail-thread-dmc  { font-size: 11px; color: var(--grey); }
.detail-notes { font-size: 13px; line-height: 1.6; padding: 10px;
  background: var(--offwht); border-radius: var(--radius-sm); }
.detail-actions { display: flex; gap: 10px; padding: 16px 18px;
  border-top: 1px solid var(--offwht); margin-top: 16px; }
.detail-builtin-note { font-size: 11px; color: var(--grey); font-style: italic;
  padding: 0 18px 14px; }

/* ═══════════════════════════════════════════════════════════════════
   FORM
═══════════════════════════════════════════════════════════════════ */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 11px; font-weight: 600; color: var(--grey);
  margin-bottom: 5px; letter-spacing: 0.4px; text-transform: uppercase; }
.form-input, .form-textarea {
  width: 100%; padding: 9px 11px;
  border: 1.5px solid var(--lgrey); border-radius: var(--radius-sm);
  font-family: inherit; font-size: 14px; color: var(--black);
  background: var(--white); transition: border-color 0.15s; outline: none;
  -webkit-appearance: none;
}
.form-input:focus, .form-textarea:focus { border-color: var(--black); }
.form-input.error, .form-textarea.error { border-color: var(--coral); }
.form-error { font-size: 11px; color: var(--coral); margin-top: 3px; }
.form-hint  { font-size: 11px; color: var(--grey);  margin-top: 3px; }
.form-textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-actions { display: flex; gap: 10px; justify-content: flex-end; padding-top: 6px; }

/* ── Thread editor ── */
.thread-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 6px; }
.thread-row { display: grid; grid-template-columns: 32px 1fr 1fr auto;
  gap: 6px; align-items: center; }
.thread-color-btn { width: 32px; height: 32px; border-radius: 6px;
  border: 1.5px solid var(--lgrey); cursor: pointer; padding: 0;
  position: relative; overflow: hidden; }
.thread-color-input { position: absolute; inset: -4px; opacity: 0; cursor: pointer; width: 150%; }
.thread-remove { width: 28px; height: 28px; border-radius: 50%; background: transparent;
  border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--grey); transition: all 0.15s; }
.thread-remove:hover { background: #fff0ed; color: var(--coral); }
.add-thread-btn { display: flex; align-items: center; gap: 5px; padding: 6px 0;
  background: none; border: none; font-family: inherit; font-size: 12px;
  font-weight: 500; color: var(--green); cursor: pointer; }
.add-thread-btn:hover { color: var(--black); }

/* ── Border picker ── */
.border-picker { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
.border-picker::-webkit-scrollbar { height: 3px; }
.border-option {
  flex-shrink: 0; width: 88px; cursor: pointer;
  border: 2px solid var(--lgrey); border-radius: var(--radius-sm);
  overflow: hidden; transition: all 0.15s;
}
.border-option.selected { border-color: var(--coral); }
.border-option:hover { border-color: var(--black); }
.border-option-thumb { background: var(--linen); line-height: 0; }
.border-option-thumb canvas { display: block; width: 100%; height: auto; }
.border-option-label { font-size: 10px; font-weight: 500; padding: 4px 5px;
  text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ═══════════════════════════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════════════════════════ */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 9px 18px; border-radius: var(--radius-sm); border: none; cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 500; transition: all 0.15s; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary  { background: var(--black); color: var(--white); }
.btn-primary:hover:not(:disabled)  { background: #333; }
.btn-coral    { background: var(--coral); color: var(--white); }
.btn-coral:hover:not(:disabled)    { background: #aa2900; }
.btn-outlined { background: transparent; color: var(--black); border: 1.5px solid var(--lgrey); }
.btn-outlined:hover:not(:disabled) { border-color: var(--black); background: var(--offwht); }
.btn-danger   { background: transparent; color: var(--coral); border: 1.5px solid var(--coral); }
.btn-danger:hover:not(:disabled)   { background: #fff0ed; }
.btn-ghost    { background: transparent; color: var(--grey); padding: 7px 10px; }
.btn-ghost:hover:not(:disabled)    { background: var(--offwht); color: var(--black); }
.btn-google   { background: var(--white); color: var(--black); border: 1.5px solid var(--lgrey);
  width: 100%; padding: 11px; font-size: 14px; }
.btn-google:hover { border-color: var(--black); }
.btn-icon { width: 36px; height: 36px; padding: 0; border-radius: 50%; background: transparent;
  border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s; color: var(--grey); }
.btn-icon:hover { background: var(--offwht); color: var(--black); }
.btn-icon svg { width: 18px; height: 18px; }

/* ═══════════════════════════════════════════════════════════════════
   DIALOG
═══════════════════════════════════════════════════════════════════ */
.dialog { background: var(--surface); border-radius: var(--radius);
  width: calc(100% - 48px); max-width: 340px; margin: auto; padding: 22px;
  animation: scaleIn 0.15s ease; }
@keyframes scaleIn {
  from { transform: scale(0.95); opacity: 0; }
  to   { transform: scale(1);    opacity: 1; }
}
.dialog h3 { font-size: 16px; font-weight: 700; margin-bottom: 7px; }
.dialog p  { font-size: 13px; color: var(--grey); line-height: 1.5; margin-bottom: 18px; }
.dialog-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* ═══════════════════════════════════════════════════════════════════
   SIGN-IN
═══════════════════════════════════════════════════════════════════ */
.signin-screen { min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 32px 24px; }
.signin-wordmark { font-size: 30px; font-weight: 700; color: var(--black); }
.signin-wordmark span { color: var(--coral); }
.signin-tagline { font-size: 12px; color: var(--green); font-weight: 500;
  letter-spacing: 0.5px; margin-bottom: 44px; margin-top: 4px; }
.signin-card { background: var(--surface); border: 1px solid var(--lgrey);
  border-radius: var(--radius); padding: 28px 24px; max-width: 340px; width: 100%;
  text-align: center; }
.signin-card h2 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.signin-card p { font-size: 12px; color: var(--grey); margin-bottom: 24px; line-height: 1.5; }
.signin-icon { font-size: 44px; margin-bottom: 12px; display: block; }

/* ═══════════════════════════════════════════════════════════════════
   LOADING / TOAST
═══════════════════════════════════════════════════════════════════ */
.loading-screen { min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px; }
.spinner { width: 28px; height: 28px; border-radius: 50%;
  border: 3px solid var(--lgrey); border-top-color: var(--coral);
  animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 12px; color: var(--grey); }

.toast { position: fixed; bottom: calc(var(--nav-h) + 12px); left: 50%;
  transform: translateX(-50%); background: var(--black); color: var(--white);
  padding: 9px 16px; border-radius: 20px; font-size: 12px; font-weight: 500;
  z-index: 300; white-space: nowrap; pointer-events: none;
  animation: toastIn 0.2s ease; }
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(6px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}

@media (min-width: 600px) {
  .overlay { align-items: center; }
  .sheet { border-radius: var(--radius); margin: 24px; max-height: 82vh; }
}
</style>
</head>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

/* ═══════════════════════════════════════════════════════════════════
   CONSTANTS — LETTER BITMAPS

═══════════════════════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════════════════
   GRID ENGINE — pure logic, no React, no Firebase
═══════════════════════════════════════════════════════════════════ */
function buildGrid(word, cols, rows, borderStyle, scale, gap) {
  scale = scale || 2;
  gap   = gap   || 4;
  cols  = cols  || 110;
  rows  = rows  || 110;
  borderStyle = borderStyle || 'british';

  const grid = [];
  for (let r = 0; r < rows; r++) grid.push(new Array(cols).fill(' '));

  function setCell(r, c, kind) {
    if (r >= 0 && r < rows && c >= 0 && c < cols && grid[r][c] === ' ')
      grid[r][c] = kind;
  }

  const N = cols;

  // ── Border: shared outer edge ──
  for (let i = 0; i < N; i++) { setCell(0,i,'B'); setCell(N-1,i,'B'); }
  for (let i = 0; i < N; i++) { setCell(i,0,'B'); setCell(i,N-1,'B'); }

  if (borderStyle === 'british') {
    // 4 inner border lines: alternating check / solid accent
    for (let line = 1; line < 5; line++) {
      for (let i = line; i < N-line; i++) {
        let kt, kb, kl, kr;
        if (line % 2 === 1) {
          kt = i%2===0?'D':'E'; kb = i%2===1?'D':'E';
          kl = i%2===0?'D':'E'; kr = i%2===1?'D':'E';
        } else { kt=kb=kl=kr='A'; }
        setCell(line,i,kt); setCell(N-1-line,i,kb);
        setCell(i,line,kl); setCell(i,N-1-line,kr);
      }
    }
    // corner footballs 9x9
    const ball = [
      "011101110","101010101","110101011","001111100",
      "011101110","001111100","110101011","101010101","011101110"
    ];
    [[7,7],[7,N-16],[N-16,7],[N-16,N-16]].forEach(([br,bc]) => {
      ball.forEach((rs,dr) => rs.split('').forEach((ch,dc) => {
        if (ch==='1') setCell(br+dr, bc+dc, 'F');
      }));
    });
    // goal posts top/bottom 41x9
    const gw=41, gh=9;
    const goalRows = [];
    for (let r2=0;r2<gh;r2++) {
      if (r2<=5)       goalRows.push('11'+'0'.repeat(gw-4)+'11');
      else if (r2===6) goalRows.push('1'.repeat(gw));
      else             goalRows.push('0'.repeat(gw));
    }
    [7, N-7-gh+1].forEach(srs => {
      const gc = Math.floor((N-gw)/2);
      goalRows.forEach((rs,dr) => rs.split('').forEach((ch,dc) => {
        if (ch==='1') setCell(srs+dr, gc+dc, 'G');
      }));
    });
    // shot arrows left/right 9x9
    const arrow = [
      "000010000","000111000","001111100","011111110","111111111",
      "011111110","001111100","000111000","000010000"
    ];
    [7, N-16].forEach(scs => {
      const ar = Math.floor((N-9)/2);
      arrow.forEach((rs,dr) => rs.split('').forEach((ch,dc) => {
        if (ch==='1') setCell(ar+dr, scs+dc, 'S');
      }));
    });

  } else if (borderStyle === 'scandinavian') {
    // Second solid line
    for (let i=1;i<N-1;i++) { setCell(1,i,'A'); setCell(N-2,i,'A'); }
    for (let i=1;i<N-1;i++) { setCell(i,1,'A'); setCell(i,N-2,'A'); }
    // Diamond repeat every 8 on third line (placeholder — AI will refine)
    for (let i=4;i<N-4;i+=8) {
      [[3,i],[i,3],[3,N-1-i],[N-1-i,3]].forEach(([r2,c2]) => setCell(r2,c2,'D'));
    }

  } else if (borderStyle === 'minimal') {
    // Just the outer solid line — already drawn above
  }

  // ── Text (shared across all border styles) ──
  const chars = word.toUpperCase().split('').map(ch => LETTERS[ch] || LETTERS['?']);
  const tw = chars.reduce((s,l) => s + l[0].length*scale, 0) + gap*(chars.length-1);
  const th = 7*scale;
  let x = Math.floor((cols-tw)/2);
  const startRow = Math.floor((rows-th)/2);
  chars.forEach(letter => {
    letter.forEach((rs,r) => rs.split('').forEach((ch,c) => {
      if (ch==='1') {
        for (let dr=0;dr<scale;dr++) for (let dc=0;dc<scale;dc++)
          setCell(startRow+r*scale+dr, x+c*scale+dc, 'T');
      }
    }));
    x += letter[0].length*scale + gap;
  });

  return grid;
}

function stitchColor(kind, threads) {
  const black = threads&&threads[0] ? threads[0].hex : '#1A1A1A';
  const green = threads&&threads[1] ? threads[1].hex : '#4A6741';
  const coral = threads&&threads[2] ? threads[2].hex : '#CC3300';
  return {'T':black,'B':black,'A':black,'F':black,'G':green,'D':green,'E':coral,'S':coral}[kind]||null;
}

/* ═══════════════════════════════════════════════════════════════════
   CANVAS COMPONENT
═══════════════════════════════════════════════════════════════════ */
function CrossStitchCanvas({ word, cols, rows, borderStyle, threads, size, className }) {
  const canvasRef = useRef(null);
  cols = cols||110; rows = rows||110;

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas || !word) return;
    const px = size||440;
    const cell = px/cols;
    canvas.width = px; canvas.height = px;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#F0E6D3';
    ctx.fillRect(0,0,px,px);

    const grid = buildGrid(word, cols, rows, borderStyle, 2, 4);
    const pad = cell*0.1;
    const lw  = Math.max(cell*0.24, 0.5);

    grid.forEach((rowArr,row) => rowArr.forEach((kind,col) => {
      if (kind===' ') return;
      const c = stitchColor(kind, threads);
      if (!c) return;
      const x=col*cell, y=row*cell;
      ctx.strokeStyle=c; ctx.lineWidth=lw;
      ctx.beginPath();
      ctx.moveTo(x+pad,y+pad); ctx.lineTo(x+cell-pad,y+cell-pad);
      ctx.moveTo(x+cell-pad,y+pad); ctx.lineTo(x+pad,y+cell-pad);
      ctx.stroke();
    }));

    // minor grid
    ctx.strokeStyle='rgba(0,0,0,0.07)'; ctx.lineWidth=0.3;
    for(let i=0;i<=cols;i++){ctx.beginPath();ctx.moveTo(i*cell,0);ctx.lineTo(i*cell,px);ctx.stroke();}
    for(let i=0;i<=rows;i++){ctx.beginPath();ctx.moveTo(0,i*cell);ctx.lineTo(px,i*cell);ctx.stroke();}
    // every-10
    ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=0.5;
    for(let i=0;i<=cols;i+=10){ctx.beginPath();ctx.moveTo(i*cell,0);ctx.lineTo(i*cell,px);ctx.stroke();}
    for(let i=0;i<=rows;i+=10){ctx.beginPath();ctx.moveTo(0,i*cell);ctx.lineTo(px,i*cell);ctx.stroke();}
    // frame
    ctx.strokeStyle='#1A1A1A'; ctx.lineWidth=1.5;
    ctx.strokeRect(0,0,px,px);

  }, [word, cols, rows, borderStyle, size, JSON.stringify(threads)]);

  return (
    <div className={className||'canvas-full'}>
      <canvas ref={canvasRef}/>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   VALIDATION HELPERS
═══════════════════════════════════════════════════════════════════ */
function validateShoutout(fields) {
  const errors = {};
  if (!fields.name || !fields.name.trim()) errors.name = 'Word or phrase is required';
  if (!fields.stitchesW || fields.stitchesW < 10 || fields.stitchesW > 300) errors.stitchesW = '10–300';
  if (!fields.stitchesH || fields.stitchesH < 10 || fields.stitchesH > 300) errors.stitchesH = '10–300';
  if (!fields.hoopW || fields.hoopW < 50 || fields.hoopW > 600) errors.hoopW = '50–600mm';
  if (!fields.hoopH || fields.hoopH < 50 || fields.hoopH > 600) errors.hoopH = '50–600mm';
  if (!fields.borderId) errors.borderId = 'Select a border style';
  return errors;
}
function validateBorder(fields) {
  const errors = {};
  if (!fields.name || !fields.name.trim()) errors.name = 'Name is required';
  if (!fields.description || !fields.description.trim()) errors.description = 'Description is required';
  return errors;
}
function hasErrors(e) { return Object.keys(e).length > 0; }

   HOOKS
═══════════════════════════════════════════════════════════════════ */
function useToast() {
  const [msg, setMsg] = useState(null);
  const show = useCallback(m => { setMsg(m); setTimeout(()=>setMsg(null),2500); }, []);
  return [msg, show];
}

function formatDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

/* ═══════════════════════════════════════════════════════════════════
   SHOUTOUT FORM
═══════════════════════════════════════════════════════════════════ */
function ShoutoutForm({ initial, borders, onSave, onClose, saving }) {
  const isEdit = !!initial;
  const [name,      setName]      = useState(initial?initial.name:'');
  const [stitchesW, setStitchesW] = useState(initial?initial.stitchesW:110);
  const [stitchesH, setStitchesH] = useState(initial?initial.stitchesH:110);
  const [hoopW,     setHoopW]     = useState(initial?initial.hoopW:280);
  const [hoopH,     setHoopH]     = useState(initial?initial.hoopH:250);
  const [notes,     setNotes]     = useState(initial?initial.notes:'');
  const [borderId,  setBorderId]  = useState(initial?initial.borderId:'');
  const [borderName,setBorderName]= useState(initial?initial.borderName:'');
  const [threads,   setThreads]   = useState(
    initial&&initial.threads&&initial.threads.length>0 ? initial.threads : DEFAULT_THREADS
  );
  const [errors, setErrors] = useState({});
  const [touched, setTouched] = useState({});

  function touch(field) { setTouched(p=>({...p,[field]:true})); }

  function updateThread(i,u) { setThreads(p=>p.map((t,idx)=>idx===i?u:t)); }
  function removeThread(i)   { setThreads(p=>p.filter((_,idx)=>idx!==i)); }
  function addThread()       { setThreads(p=>[...p,{id:Date.now(),name:'',dmc:'',hex:'#666666',usage:''}]); }

  function handleSave() {
    const fields = {name,stitchesW:+stitchesW,stitchesH:+stitchesH,
      hoopW:+hoopW,hoopH:+hoopH,notes,borderId,borderName,threads};
    const errs = validateShoutout(fields);
    setErrors(errs);
    setTouched({name:true,stitchesW:true,stitchesH:true,hoopW:true,hoopH:true,borderId:true});
    if (hasErrors(errs)) return;
    onSave(fields);
  }

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="sheet">
        <div className="sheet-handle"/>
        <div className="sheet-header">
          <span className="sheet-title">{isEdit?'Edit shoutout':'New shoutout'}</span>
          <button className="btn-icon" onClick={onClose}><Ico.Close/></button>
        </div>
        <div className="sheet-body">

          <div className="form-group">
            <label className="form-label">Word or phrase</label>
            <input className={'form-input'+(touched.name&&errors.name?' error':'')}
              placeholder="e.g. GOAL!" value={name}
              onChange={e=>setName(e.target.value)}
              onBlur={()=>touch('name')} autoFocus/>
            {touched.name&&errors.name && <div className="form-error">{errors.name}</div>}
          </div>

          <div className="form-group">
            <label className="form-label">Border style</label>
            <BorderPicker borders={borders} selected={borderId}
              onSelect={(id,nm)=>{setBorderId(id);setBorderName(nm);touch('borderId');}}/>
            {touched.borderId&&errors.borderId && <div className="form-error">{errors.borderId}</div>}
          </div>

          <div className="form-group">
            <label className="form-label">Stitch count</label>
            <div className="form-row">
              <div>
                <input type="number" className={'form-input'+(touched.stitchesW&&errors.stitchesW?' error':'')}
                  value={stitchesW} onChange={e=>setStitchesW(e.target.value)} onBlur={()=>touch('stitchesW')}/>
                <div className={touched.stitchesW&&errors.stitchesW?'form-error':'form-hint'}>
                  {touched.stitchesW&&errors.stitchesW?errors.stitchesW:'Width (stitches)'}
                </div>
              </div>
              <div>
                <input type="number" className={'form-input'+(touched.stitchesH&&errors.stitchesH?' error':'')}
                  value={stitchesH} onChange={e=>setStitchesH(e.target.value)} onBlur={()=>touch('stitchesH')}/>
                <div className={touched.stitchesH&&errors.stitchesH?'form-error':'form-hint'}>
                  {touched.stitchesH&&errors.stitchesH?errors.stitchesH:'Height (stitches)'}
                </div>
              </div>
            </div>
          </div>

          <div className="form-group">
            <label className="form-label">Hoop size (mm)</label>
            <div className="form-row">
              <div>
                <input type="number" className={'form-input'+(touched.hoopW&&errors.hoopW?' error':'')}
                  value={hoopW} onChange={e=>setHoopW(e.target.value)} onBlur={()=>touch('hoopW')}/>
                <div className={touched.hoopW&&errors.hoopW?'form-error':'form-hint'}>
                  {touched.hoopW&&errors.hoopW?errors.hoopW:'Width (mm)'}
                </div>
              </div>
              <div>
                <input type="number" className={'form-input'+(touched.hoopH&&errors.hoopH?' error':'')}
                  value={hoopH} onChange={e=>setHoopH(e.target.value)} onBlur={()=>touch('hoopH')}/>
                <div className={touched.hoopH&&errors.hoopH?'form-error':'form-hint'}>
                  {touched.hoopH&&errors.hoopH?errors.hoopH:'Height (mm)'}
                </div>
              </div>
            </div>
          </div>

          <div className="form-group">
            <label className="form-label">Threads</label>
            <div className="thread-list">
              {threads.map((t,i)=>(
                <ThreadRow key={t.id||i} thread={t}
                  onChange={u=>updateThread(i,u)} onRemove={()=>removeThread(i)}/>
              ))}
            </div>
            <button className="add-thread-btn" onClick={addThread}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              Add thread
            </button>
          </div>

          <div className="form-group">
            <label className="form-label">Notes</label>
            <textarea className="form-textarea" placeholder="Any notes about this shoutout…"
              value={notes} onChange={e=>setNotes(e.target.value)}/>
          </div>

          <div className="form-actions">
            <button className="btn btn-outlined" onClick={onClose}>Cancel</button>
            <button className="btn btn-coral" onClick={handleSave} disabled={saving}>
              {saving?'Saving…':isEdit?'Save changes':'Create shoutout'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

        {shoutout.notes && (
          <div className="detail-section">
            <div className="detail-section-label">Notes</div>
            <div className="detail-notes">{shoutout.notes}</div>
          </div>
        )}

        <div className="detail-actions">
          <button className="btn btn-danger" onClick={onDelete}><Ico.Delete/> Delete</button>
          <button className="btn btn-primary" style={{marginLeft:'auto'}} onClick={onEdit}>
            <Ico.Edit/> Edit
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   BORDER FORM
═══════════════════════════════════════════════════════════════════ */
const STYLE_OPTIONS = ['british','scandinavian','minimal','custom'];
const TRAIT_OPTIONS = ['diagonal-check','corner-footballs','goal-posts','shot-arrows',
  'geometric','diamond-repeat','two-line-frame','single-line','floral','folk-motifs'];

function BorderForm({ initial, onSave, onClose, saving }) {
  const isEdit = !!initial;
  const [name,   setName]   = useState(initial?initial.name:'');
  const [style,  setStyle]  = useState(initial?initial.style:'custom');
  const [desc,   setDesc]   = useState(initial?initial.description:'');
  const [traits, setTraits] = useState(initial?initial.traits:[]);
  const [errors, setErrors] = useState({});
  const [touched,setTouched]= useState({});

  function toggleTrait(t) {
    setTraits(p=>p.includes(t)?p.filter(x=>x!==t):[...p,t]);
  }

  function handleSave() {
    const fields = {name,style,description:desc,traits};
    const errs = validateBorder(fields);
    setErrors(errs); setTouched({name:true,description:true});
    if (hasErrors(errs)) return;
    onSave(fields);
  }

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="sheet">
        <div className="sheet-handle"/>
        <div className="sheet-header">
          <span className="sheet-title">{isEdit?'Edit border':'New border'}</span>
          <button className="btn-icon" onClick={onClose}><Ico.Close/></button>
        </div>
        <div className="sheet-body">

          <div className="form-group">
            <label className="form-label">Border name</label>
            <input className={'form-input'+(touched.name&&errors.name?' error':'')}
              placeholder="e.g. Nordic Diamonds" value={name}
              onChange={e=>setName(e.target.value)} onBlur={()=>setTouched(p=>({...p,name:true}))}
              autoFocus/>
            {touched.name&&errors.name && <div className="form-error">{errors.name}</div>}
          </div>

          <div className="form-group">
            <label className="form-label">Style</label>
            <select className="form-input" value={style} onChange={e=>setStyle(e.target.value)}>
              {STYLE_OPTIONS.map(s=><option key={s} value={s}>{s.charAt(0).toUpperCase()+s.slice(1)}</option>)}
            </select>
            <div className="form-hint">Drives the canvas rendering logic</div>
          </div>

          <div className="form-group">
            <label className="form-label">Description</label>
            <textarea className={'form-textarea'+(touched.description&&errors.description?' error':'')}
              placeholder="Describe the visual character and tradition of this border…"
              value={desc} onChange={e=>setDesc(e.target.value)}
              onBlur={()=>setTouched(p=>({...p,description:true}))}/>
            {touched.description&&errors.description &&
              <div className="form-error">{errors.description}</div>}
          </div>

          <div className="form-group">
            <label className="form-label">Traits</label>
            <div style={{display:'flex',flexWrap:'wrap',gap:'6px'}}>
              {TRAIT_OPTIONS.map(t=>(
                <button key={t}
                  className="btn btn-outlined"
                  style={{
                    fontSize:11,padding:'4px 10px',
                    background:traits.includes(t)?'var(--black)':'',
                    color:traits.includes(t)?'var(--white)':'',
                    borderColor:traits.includes(t)?'var(--black)':''
                  }}
                  onClick={()=>toggleTrait(t)}>{t}
                </button>
              ))}
            </div>
            <div className="form-hint">Select all that apply</div>
          </div>

          <div className="form-actions">
            <button className="btn btn-outlined" onClick={onClose}>Cancel</button>
            <button className="btn btn-coral" onClick={handleSave} disabled={saving}>
              {saving?'Saving…':isEdit?'Save changes':'Create border'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   BORDER DETAIL
═══════════════════════════════════════════════════════════════════ */
function BorderDetail({ border, onEdit, onDelete, onClose }) {
  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="sheet">
        <div className="sheet-handle"/>
        <div className="sheet-header">
          <span className="sheet-title">Border style</span>
          <button className="btn-icon" onClick={onClose}><Ico.Close/></button>
        </div>
        <div className="detail-title">{border.name}</div>
        <div className="detail-meta">
          Style: {border.style}
          {border.builtIn && <span>&nbsp;·&nbsp; Built-in</span>}
          {border.createdAt && <span>&nbsp;·&nbsp; {formatDate(border.createdAt)}</span>}
        </div>

        {border.builtIn &&
          <div className="detail-builtin-note">
            This is a built-in border. The description and traits are read-only and will be refined by the AI.
          </div>
        }

        <div className="detail-section">
          <div className="detail-section-label">Preview</div>
          <CrossStitchCanvas word="ABC" cols={60} rows={60}
            borderStyle={border.style} threads={DEFAULT_THREADS} size={400}/>
        </div>

        {border.description && (
          <div className="detail-section">
            <div className="detail-section-label">Description</div>
            <div className="detail-notes">{border.description}</div>
          </div>
        )}

        {border.traits&&border.traits.length>0 && (
          <div className="detail-section">
            <div className="detail-section-label">Traits</div>
            <div className="card-traits" style={{paddingTop:2}}>
              {border.traits.map(t=><span key={t} className="trait-chip">{t}</span>)}
            </div>
          </div>
        )}

        <div className="detail-actions">
          {!border.builtIn && (
            <button className="btn btn-danger" onClick={onDelete}><Ico.Delete/> Delete</button>
          )}
          <button className="btn btn-primary" style={{marginLeft:'auto'}} onClick={onEdit}
            disabled={border.builtIn}>
            {border.builtIn ? <><Ico.Lock/> Built-in</> : <><Ico.Edit/> Edit</>}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   CONFIRM DIALOG
═══════════════════════════════════════════════════════════════════ */
function ConfirmDialog({ title, message, onConfirm, onCancel }) {
  return (
    <div className="overlay overlay-center" onClick={e=>e.target===e.currentTarget&&onCancel()}>
      <div className="dialog">
        <h3>{title}</h3><p>{message}</p>
        <div className="dialog-actions">
          <button className="btn btn-outlined" onClick={onCancel}>Cancel</button>
          <button className="btn btn-danger"   onClick={onConfirm}>Delete</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   TOP BAR + USER MENU
═══════════════════════════════════════════════════════════════════ */
function TopBar({ user, onSignOut }) {
  const [open, setOpen] = useState(false);
  return (
    <div className="topbar">
      <div className="topbar-wordmark">Nutmeg<span>&</span>Needle</div>
      <div className="topbar-app-name">Wordplay</div>
      <div style={{position:'relative'}}>
        <img className="topbar-avatar"
          src={user.photoURL||'https://via.placeholder.com/32'}
          alt={user.displayName} onClick={()=>setOpen(o=>!o)}/>
        {open && (
          <div style={{position:'absolute',top:40,right:0,background:'var(--surface)',
            border:'1px solid var(--lgrey)',borderRadius:10,padding:'4px 0',minWidth:180,
            boxShadow:'0 4px 16px rgba(0,0,0,0.12)',zIndex:200}}>
            <div style={{padding:'7px 13px 5px',fontSize:11,color:'var(--grey)',
              borderBottom:'1px solid var(--offwht)',marginBottom:3}}>
              {user.displayName||user.email}
            </div>
            <button className="btn btn-ghost"
              style={{width:'100%',justifyContent:'flex-start',gap:7,padding:'7px 13px',
                borderRadius:0,fontSize:12}}
              onClick={()=>{setOpen(false);onSignOut();}}>
              <Ico.SignOut/> Sign out
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   SIGN-IN SCREEN
═══════════════════════════════════════════════════════════════════ */
function SignInScreen({ onSignIn, error }) {
  return (
    <div className="signin-screen">
      <div className="signin-wordmark">Nutmeg<span>&</span>Needle</div>
      <div className="signin-tagline">Handcrafted football moves</div>
      <div className="signin-card">
        <span className="signin-icon">🧵</span>
        <h2>Wordplay</h2>
        <p>Your library of football shoutouts in cross-stitch.</p>
        {error && <p style={{color:'var(--coral)',fontSize:12,marginBottom:10}}>{error}</p>}
        <button className="btn btn-google" onClick={onSignIn}>
          <Ico.Google/> Sign in with Google
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   SHOUTOUTS SCREEN
═══════════════════════════════════════════════════════════════════ */
function ShoutoutsScreen({ shoutouts, borders, onSelect }) {
  return (
    <div className="screen">
      <div className="screen-header">
        <span className="screen-title">Football shoutouts</span>
        <span className="screen-count">{shoutouts.length} {shoutouts.length===1?'shoutout':'shoutouts'}</span>
      </div>
      {shoutouts.length===0 ? (
        <div className="empty">
          <span className="empty-icon">🧵</span>
          <h3>No shoutouts yet</h3>
          <p>Tap + to create your first football shoutout in cross-stitch.</p>
        </div>
      ) : (
        <div className="card-grid">
          {shoutouts.map(s=>(
            <div key={s.id} className="card" onClick={()=>onSelect(s)}>
              <div className="card-badge">{s.borderName||'No border'}</div>
              <CrossStitchCanvas word={s.name}
                cols={s.stitchesW} rows={s.stitchesH}
                borderStyle={s.borderStyle||'british'}
                threads={s.threads} size={220}
                className="canvas-thumb"/>
              <div className="card-title">{s.name}</div>
              <div className="card-sub">
                {s.stitchesW}×{s.stitchesH} stitches · {s.hoopW}×{s.hoopH}mm
              </div>
              {s.threads&&s.threads.length>0 && (
                <div className="thread-chips">
                  {s.threads.slice(0,3).map((t,i)=>(
                    <span key={i} className="thread-chip">
                      <span className="thread-dot" style={{background:t.hex}}/>
                      {t.dmc||t.name}
                    </span>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   BORDERS SCREEN
═══════════════════════════════════════════════════════════════════ */
function BordersScreen({ borders, onSelect }) {
  return (
    <div className="screen">
      <div className="screen-header">
        <span className="screen-title">Border library</span>
        <span className="screen-count">{borders.length} {borders.length===1?'border':'borders'}</span>
      </div>
      {borders.length===0 ? (
        <div className="empty">
          <span className="empty-icon">🪡</span>
          <h3>No borders yet</h3>
          <p>Tap + to add a custom border style.</p>
        </div>
      ) : (
        <div className="card-grid">
          {borders.map(b=>(
            <div key={b.id} className="card" onClick={()=>onSelect(b)}>
              {b.builtIn && <div className="card-badge">Built-in</div>}
              <CrossStitchCanvas word="ABC" cols={60} rows={60}
                borderStyle={b.style} threads={DEFAULT_THREADS} size={220}
                className="canvas-thumb"/>
              <div className="card-title">{b.name}</div>
              {b.description && (
                <div className="card-desc">{b.description.slice(0,90)}{b.description.length>90?'…':''}</div>
              )}
              {b.traits&&b.traits.length>0 && (
                <div className="card-traits">
                  {b.traits.slice(0,4).map(t=><span key={t} className="trait-chip">{t}</span>)}
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════════════════════════ */
function App() {
  const [authUser,    setAuthUser]    = useState(undefined);
  const [authError,   setAuthError]   = useState(null);
  const [tab,         setTab]         = useState('shoutouts');
  const [shoutouts,   setShoutouts]   = useState([]);
  const [borders,     setBorders]     = useState([]);
  const [selShoutout, setSelShoutout] = useState(null);
  const [selBorder,   setSelBorder]   = useState(null);
  const [editShoutout,setEditShoutout]= useState(null);
  const [editBorder,  setEditBorder]  = useState(null);
  const [confirmDel,  setConfirmDel]  = useState(null);
  const [saving,      setSaving]      = useState(false);
  const [toast,       showToast]      = useToast();
  const fb = window.__firebase;

  // ── Auth ──
  useEffect(()=>{
    const unsub = fb.onAuthStateChanged(fb.auth, u=>setAuthUser(u||null));
    return ()=>unsub();
  },[]);

  // ── Seed built-in borders once ──
  async function seedBorders() {
    try {
      const snap = await fb.getDocs(fb.collection(fb.db,'borders'));
      if (!snap.empty) return;
      for (const b of BUILTIN_BORDERS) {
        await fb.setDoc(fb.doc(fb.db,'borders',b.id), {
          ...b, createdAt: fb.serverTimestamp()
        });
      }
    } catch(e) { console.warn('Border seed failed:', e); }
  }

  // ── Borders listener (shared collection) ──
  useEffect(()=>{
    if (!authUser) { setBorders([]); return; }
    seedBorders();
    const q = fb.query(fb.collection(fb.db,'borders'), fb.orderBy('createdAt','asc'));
    const unsub = fb.onSnapshot(q, snap=>{
      setBorders(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
    return ()=>unsub();
  },[authUser]);

  // ── Shoutouts listener (per-user) ──
  useEffect(()=>{
    if (!authUser) { setShoutouts([]); return; }
    const q = fb.query(
      fb.collection(fb.db,'users',authUser.uid,'shoutouts'),
      fb.orderBy('createdAt','desc')
    );
    const unsub = fb.onSnapshot(q, snap=>{
      setShoutouts(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
    return ()=>unsub();
  },[authUser]);

  // ── Sign in/out ──
  async function handleSignIn() {
    setAuthError(null);
    try {
      await fb.signInWithPopup(fb.auth, new fb.GoogleAuthProvider());
    } catch(e) { setAuthError('Sign-in failed. Please try again.'); }
  }
  async function handleSignOut() { await fb.signOut(fb.auth); }

  // ── Save shoutout ──
  async function saveShoutout(data) {
    setSaving(true);
    try {
      // Carry borderStyle from the selected border
      const border = borders.find(b=>b.id===data.borderId);
      const fullData = {...data, borderStyle: border?border.style:'british'};
      if (editShoutout && editShoutout!=='new') {
        await fb.updateDoc(
          fb.doc(fb.db,'users',authUser.uid,'shoutouts',editShoutout.id),
          {...fullData, updatedAt:fb.serverTimestamp()}
        );
        showToast('Shoutout updated');
      } else {
        await fb.addDoc(
          fb.collection(fb.db,'users',authUser.uid,'shoutouts'),
          {...fullData, createdAt:fb.serverTimestamp(), updatedAt:fb.serverTimestamp()}
        );
        showToast('Shoutout created');
      }
      setEditShoutout(null); setSelShoutout(null);
    } catch(e) { showToast('Something went wrong — try again'); }
    finally { setSaving(false); }
  }

  // ── Save border ──
  async function saveBorder(data) {
    setSaving(true);
    try {
      if (editBorder && editBorder!=='new') {
        await fb.updateDoc(
          fb.doc(fb.db,'borders',editBorder.id),
          {...data, updatedAt:fb.serverTimestamp()}
        );
        showToast('Border updated');
      } else {
        await fb.addDoc(fb.collection(fb.db,'borders'), {
          ...data, builtIn:false, createdBy:authUser.uid,
          createdAt:fb.serverTimestamp(), updatedAt:fb.serverTimestamp()
        });
        showToast('Border created');
      }
      setEditBorder(null); setSelBorder(null);
    } catch(e) { showToast('Something went wrong — try again'); }
    finally { setSaving(false); }
  }

  // ── Delete ──
  async function handleDelete() {
    if (!confirmDel) return;
    try {
      if (confirmDel.type==='shoutout') {
        await fb.deleteDoc(fb.doc(fb.db,'users',authUser.uid,'shoutouts',confirmDel.id));
        showToast('Shoutout deleted'); setSelShoutout(null);
      } else {
        await fb.deleteDoc(fb.doc(fb.db,'borders',confirmDel.id));
        showToast('Border deleted'); setSelBorder(null);
      }
      setConfirmDel(null);
    } catch(e) { showToast('Delete failed — try again'); }
  }

  // ── Loading ──
  if (authUser===undefined) return (
    <div className="loading-screen">
      <div className="spinner"/>
      <div className="loading-text">Loading Wordplay…</div>
    </div>
  );

  if (!authUser) return <SignInScreen onSignIn={handleSignIn} error={authError}/>;

  return (
    <div>
      <TopBar user={authUser} onSignOut={handleSignOut}/>

      {/* Screens */}
      {tab==='shoutouts' && (
        <ShoutoutsScreen shoutouts={shoutouts} borders={borders}
          onSelect={s=>setSelShoutout(s)}/>
      )}
      {tab==='borders' && (
        <BordersScreen borders={borders} onSelect={b=>setSelBorder(b)}/>
      )}

      {/* Bottom nav */}
      <nav className="bottom-nav">
        <button className={'nav-tab'+(tab==='shoutouts'?' active':'')}
          onClick={()=>setTab('shoutouts')}>
          <Ico.Shout/>
          <span className="nav-tab-label">Shoutouts</span>
        </button>
        <button className={'nav-tab'+(tab==='borders'?' active':'')}
          onClick={()=>setTab('borders')}>
          <Ico.Border/>
          <span className="nav-tab-label">Borders</span>
        </button>
      </nav>

      {/* FAB */}
      <button className="fab" title={tab==='shoutouts'?'New shoutout':'New border'}
        onClick={()=>tab==='shoutouts'?setEditShoutout('new'):setEditBorder('new')}>
        <Ico.Plus/>
      </button>

      {/* Shoutout detail */}
      {selShoutout && !editShoutout && (
        <ShoutoutDetail shoutout={selShoutout}
          onClose={()=>setSelShoutout(null)}
          onEdit={()=>setEditShoutout(selShoutout)}
          onDelete={()=>setConfirmDel({type:'shoutout',id:selShoutout.id})}/>
      )}

      {/* Shoutout form */}
      {editShoutout && (
        <ShoutoutForm
          initial={editShoutout==='new'?null:editShoutout}
          borders={borders}
          onSave={saveShoutout}
          onClose={()=>setEditShoutout(null)}
          saving={saving}/>
      )}

      {/* Border detail */}
      {selBorder && !editBorder && (
        <BorderDetail border={selBorder}
          onClose={()=>setSelBorder(null)}
          onEdit={()=>setEditBorder(selBorder)}
          onDelete={()=>setConfirmDel({type:'border',id:selBorder.id})}/>
      )}

      {/* Border form */}
      {editBorder && (
        <BorderForm
          initial={editBorder==='new'?null:editBorder}
          onSave={saveBorder}
          onClose={()=>setEditBorder(null)}
          saving={saving}/>
      )}

      {/* Confirm delete */}
      {confirmDel && (
        <ConfirmDialog
          title={`Delete ${confirmDel.type}`}
          message="This cannot be undone."
          onConfirm={handleDelete}
          onCancel={()=>setConfirmDel(null)}/>
      )}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
