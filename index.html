function TrademarkNotice({ result }) {
  if (!result || result.risk === 'none') return null;
  const colours = { low: '#F59E0B', medium: '#CC3300', high: '#CC3300' };
  const labels  = { low: 'Low risk', medium: 'Worth checking', high: 'Likely protected' };
  return (
    <div className="trademark-notice">
      <span className="trademark-notice-icon">⚠</span>
      <div>
        <strong style={{color: colours[result.risk] || 'var(--coral)'}}>{labels[result.risk] || 'Check this'}: </strong>
        {result.reason}
        {result.suggestion && <span style={{color:'var(--grey)'}}> Try: <em>{result.suggestion}</em></span>}
      </div>
    </div>
  );
}


/* ---- src/grid.js ---- */
function buildGrid(word, cols, rows, borderStyle, scale, gap) {
  // scale=0 means auto; gap defaults to 1 (will be scaled internally)
  const GAP_BASE = (gap != null && gap > 0) ? gap : 1;
  cols  = cols  || 94;
  rows  = rows  || 94;
  const grid = [];
  for (let r = 0; r < rows; r++) grid.push(new Array(cols).fill(' '));

  function setCell(r, c, kind) {
    if (r >= 0 && r < rows && c >= 0 && c < cols && grid[r][c] === ' ')
      grid[r][c] = kind;
  }

  const N = cols;

  // Resolve spec
  const spec = (typeof borderStyle === 'object' && borderStyle !== null)
    ? borderStyle
    : (BORDER_SPECS[borderStyle] || BORDER_SPECS['minimal']);

  renderBorderSpec(spec, N, setCell);

  // ── Text ──
  if (!word || !word.trim()) return grid;

  const normWord = word.normalize ? word.normalize('NFC') : word;
  const upperWord = normWord.toUpperCase();

  // Build char list — resolve each char to a bitmap + optional diacritic
  const charList = upperWord.split('').map(function(ch) {
    // Check DIACRITIC_MAP first (before LETTERS, which has string redirects)
    if (ch in DIACRITIC_MAP) {
      const dm = DIACRITIC_MAP[ch];
      const bitmap = LETTERS[dm.base];
      if (Array.isArray(bitmap)) {
        return { letter: bitmap, hasDiac: true, mark: dm.mark };
      }
    }
    // Direct LETTERS lookup
    const direct = LETTERS[ch];
    if (Array.isArray(direct)) {
      return { letter: direct, hasDiac: false };
    }
    // normaliseChar fallback (handles Æ, Ø, ß, Ç which have unique bitmaps)
    const norm = normaliseChar(ch);
    const normed = LETTERS[norm];
    if (Array.isArray(normed)) {
      return { letter: normed, hasDiac: false };
    }
    return { letter: LETTERS['?'], hasDiac: false };
  });

  const hasDiacritics = charList.some(function(c) { return c.hasDiac; });
  const LETTER_H = 7;
  const DIAC_H   = hasDiacritics ? 2 : 0;
  const TEXT_H   = LETTER_H + DIAC_H;

  // ── Auto-scale ──
  // Compute true interior: must clear border layers AND side motifs
  const borderWeight = (spec && spec.borderWeight) ? spec.borderWeight : 1;
  const borderDepth = (spec && spec.layers) ? spec.layers.length * borderWeight : 2;
  const cornerInset = (spec && spec.cornerInset) ? spec.cornerInset : borderDepth + 2;

  // Find the deepest side motif extent from the edge
  // left-right motifs sit at column cornerInset, width = motif pattern width
  let sideMotifW = 0;
  if (spec && spec.sideMotifs) {
    spec.sideMotifs.forEach(function(m) {
      const pos = m.position || 'all';
      if (pos === 'left-right' || pos === 'all') {
        const mw = m.pattern ? m.pattern[0].length : 0;
        sideMotifW = Math.max(sideMotifW, mw);
      }
    });
  }
  // Interior must clear: cornerInset + sideMotifWidth + 1 stitch padding
  const edgeClear = sideMotifW > 0
    ? cornerInset + sideMotifW + 1
    : cornerInset + 2;

  const interiorW = cols - edgeClear * 2;
  const interiorH = rows - edgeClear * 2;

  const nChars = charList.length;
  const totalLetterW = charList.reduce(function(s, c) { return s + c.letter[0].length; }, 0);

  // Text width at given scale (gap is fixed, not scaled)
  function textWidth(s) {
    return totalLetterW * s + GAP_BASE * (nChars - 1);
  }

  // Maximum scale where text fits
  const maxScaleW = totalLetterW > 0
    ? Math.floor((interiorW - GAP_BASE * (nChars - 1)) / totalLetterW)
    : 1;
  const maxScaleH = Math.floor(interiorH / Math.max(TEXT_H, 1));
  const maxFits   = Math.min(maxScaleW, maxScaleH);

  // Scale preference: 2 by default.
  // Scale down to 1 if word too long for scale 2.
  // Scale up to 3 only for very short words (≤3 visible chars, e.g. "OLE").
  let autoScale;
  if (maxFits < 1) {
    autoScale = 1;
  } else if (maxFits < 2) {
    autoScale = 1;
  } else {
    const visibleChars = charList.filter(function(c) {
      return c.letter && c.letter !== LETTERS[' '];
    }).length;
    autoScale = (maxFits >= 3 && visibleChars <= 3) ? 3 : 2;
  }

  const S  = (scale && scale > 0) ? scale : autoScale;
  const tw = textWidth(S);
  const th = TEXT_H * S;

  let x          = Math.floor((cols - tw) / 2);
  const startRow = Math.floor((rows - th) / 2);

  charList.forEach(function(charEntry) {
    const letter = charEntry.letter;
    const lw     = letter[0].length;

    // Draw diacritic mark above letter
    if (charEntry.hasDiac && hasDiacritics) {
      const markRows = DIACRITICS[charEntry.mark](lw);
      markRows.forEach(function(rs, dr) {
        rs.split('').forEach(function(ch, dc) {
          if (ch === '1') {
            for (let sy = 0; sy < S; sy++) {
              for (let sx = 0; sx < S; sx++) {
                setCell(startRow + dr * S + sy, x + dc * S + sx, 'T');
              }
            }
          }
        });
      });
    }

    // Draw letter body below diacritic rows
    const letterRow = startRow + DIAC_H * S;
    letter.forEach(function(rs, r) {
      rs.split('').forEach(function(ch, c) {
        if (ch === '1') {
          for (let dr = 0; dr < S; dr++) {
            for (let dc = 0; dc < S; dc++) {
              setCell(letterRow + r * S + dr, x + c * S + dc, 'T');
            }
          }
        }
      });
    });

    // Advance x by scaled letter width + fixed gap
    x += lw * S + GAP_BASE;
  });

  return grid;
}

// ── Border spec renderer ──────────────────────────────────────────────────────
function renderBorderSpec(spec, N, setCell) {
  if (!spec) return;
  const layers = spec.layers || [];
  const borderWeight = spec.borderWeight || 1;
  const cornerFillColor = spec.cornerFill || null;

  // Helper: resolve colour name to grid kind
  function colorKind(color, fallback) {
    return color === 'secondary' ? 'D'
      : color === 'accent'   ? 'E'
      : color === 'border3'  ? 'H'
      : color === 'accent1'  ? 'J'
      : color === 'accent2'  ? 'L'
      : fallback || 'B';
  }

  // Compute corner inset — how many rows the full border occupies
  const totalBorderRows = layers.length * borderWeight;
  const inset = spec.cornerInset || totalBorderRows + 2;

  // Corner fill kind
  const cfKind = cornerFillColor ? colorKind(cornerFillColor, 'B') : null;

  layers.forEach(function(layer, li) {
    const k = colorKind(layer.color, 'B');
    const kA = colorKind(layer.colorA, 'A');
    const kB = layer.colorB === 'secondary' ? 'D' : layer.colorB === 'accent' ? 'E' : layer.colorB === 'border3' ? 'I' : layer.colorB === 'accent1' ? 'K' : layer.colorB === 'accent2' ? 'M' : 'A';
    const tile = layer.tile || null; // 8-char binary string e.g. "10001000"

    for (let w = 0; w < borderWeight; w++) {
      const ln = li * borderWeight + w;
      if (ln >= Math.floor(N / 2)) return;

      if (layer.type === 'empty') continue;

      for (let i = ln; i < N - ln; i++) {
        const inCorner = cfKind && (i < inset || i >= N - inset);

        if (inCorner) {
          // Corner zone — always solid in cornerFill colour
          setCell(ln,     i, cfKind); setCell(N-1-ln, i, cfKind);
          setCell(i,     ln, cfKind); setCell(i, N-1-ln, cfKind);
        } else if (tile) {
          // Tile pattern — check tile[i % 8]
          if (tile[i % tile.length] === '1') {
            setCell(ln, i, k); setCell(N-1-ln, i, k);
            setCell(i, ln, k); setCell(i, N-1-ln, k);
          }
        } else if (layer.type === 'solid') {
          setCell(ln, i, k); setCell(N-1-ln, i, k);
          setCell(i, ln, k); setCell(i, N-1-ln, k);
        } else if (layer.type === 'check') {
          setCell(ln,     i, i%2===0?kA:kB); setCell(N-1-ln, i, i%2===1?kA:kB);
          setCell(i,     ln, i%2===0?kA:kB); setCell(i, N-1-ln, i%2===1?kA:kB);
        }
      }
    }
  });

  // Helper: draw a motif pattern at a given top-left position
  function drawMotif(motif, sr, sc) {
    if (!motif || !motif.pattern) return;
    const k = colorKind(motif.color, 'F');
    motif.pattern.forEach(function(rs, dr) {
      rs.split('').forEach(function(ch, dc) {
        if (ch === '1') setCell(sr + dr, sc + dc, k);
      });
    });
  }

  // ── Corner motifs — per-position overrides take precedence ──
  // Positions: topLeft, topRight, bottomLeft, bottomRight
  const co = spec.cornerOverrides || {};
  const globalCorner = spec.cornerMotif || null;

  // Each corner: [row offset, col offset], position name
  const cornerDefs = [
    { name: 'topLeft',     getPos: function(w,h) { return [inset, inset]; } },
    { name: 'topRight',    getPos: function(w,h) { return [inset, N-inset-w]; } },
    { name: 'bottomLeft',  getPos: function(w,h) { return [N-inset-h, inset]; } },
    { name: 'bottomRight', getPos: function(w,h) { return [N-inset-h, N-inset-w]; } },
  ];

  cornerDefs.forEach(function(def) {
    const motif = co[def.name] || globalCorner;
    if (!motif || !motif.pattern) return;
    const w = motif.pattern[0].length;
    const h = motif.pattern.length;
    const pos = def.getPos(w, h);
    drawMotif(motif, pos[0], pos[1]);
  });

  // ── Side motifs — per-position overrides take precedence ──
  // Positions: top, bottom, left, right
  const so = spec.sideOverrides || {};

  // Build a map of what the global sideMotifs cover
  const globalSide = { top: null, bottom: null, left: null, right: null };
  if (spec.sideMotifs) {
    spec.sideMotifs.forEach(function(motif) {
      const pos = motif.position || 'all';
      if (pos === 'top-bottom' || pos === 'all') {
        globalSide.top    = globalSide.top    || motif;
        globalSide.bottom = globalSide.bottom || motif;
      }
      if (pos === 'left-right' || pos === 'all') {
        globalSide.left  = globalSide.left  || motif;
        globalSide.right = globalSide.right || motif;
      }
    });
  }

  // Draw each side — override wins over global
  function drawSide(sideName, getPos) {
    const motif = so[sideName] || globalSide[sideName];
    if (!motif || !motif.pattern) return;
    const mw = motif.pattern[0].length;
    const mh = motif.pattern.length;
    const pos = getPos(mw, mh);
    drawMotif(motif, pos[0], pos[1]);
  }

  drawSide('top',    function(mw,mh) { return [inset,              Math.floor((N-mw)/2)]; });
  drawSide('bottom', function(mw,mh) { return [N-inset-mh,         Math.floor((N-mw)/2)]; });
  drawSide('left',   function(mw,mh) { return [Math.floor((N-mh)/2), inset             ]; });
  drawSide('right',  function(mw,mh) { return [Math.floor((N-mh)/2), N-inset-mw        ]; });
}

      { line:0, type:'solid',  color:'primary' },
      { line:1, type:'check',  colorA:'secondary', colorB:'accent' },
      { line:2, type:'solid',  color:'primary' },
      { line:3, type:'check',  colorA:'accent',    colorB:'secondary' },
      { line:4, type:'solid',  color:'primary' },
    ],
    cornerInset: 7,
    cornerMotif: {
      color: 'primary',
      pattern: [
        "011101110","101010101","110101011","001111100",
        "011101110","001111100","110101011","101010101","011101110",
      ]
    },
    sideMotifs: [
      {
        position:'top-bottom', color:'secondary',
        pattern: [
          "11000000000000000000000000000000000000011",
          "11000000000000000000000000000000000000011",
          "11000000000000000000000000000000000000011",
          "11000000000000000000000000000000000000011",
          "11000000000000000000000000000000000000011",
          "11000000000000000000000000000000000000011",
          "11111111111111111111111111111111111111111",
          "00000000000000000000000000000000000000000",
          "00000000000000000000000000000000000000000",
        ]
      },
      {
        position:'left-right', color:'accent',
        pattern: [
          "000010000","000111000","001111100","011111110","111111111",
          "011111110","001111100","000111000","000010000",
        ]
      }
    ]
  },

  scandinavian: {
    layers: [
      { line:0, type:'solid', color:'primary' },
      { line:1, type:'empty' },
      { line:2, type:'solid', color:'primary' },
    ],
    cornerInset: 5,
    cornerMotif: {

      pattern: ["00100","01110","11111","01110","00100"]
    },
    sideMotifs: [{
      position:'all', color:'accent',
      pattern: ["01010","11111","01010","11111","01010"]
    }]
  },

  minimal: {
    layers: [
      { line:0, type:'solid', color:'primary' },
      { line:1, type:'solid', color:'secondary' },
    ]
  },
};

function stitchColor(kind, threads) {
  const t = threads || [];
  // Named thread slots:
  // Slot 1 — Shoutout:  T, B, A, F
  // Slot 2 — Border 1:  D, G
  // Slot 3 — Border 2:  E, S
  // Slot 4 — Border 3:  H, I
  // Slot 5 — Accent 1:  J, K
  // Slot 6 — Accent 2:  L, M
  const s1 = (t[0] && t[0].hex) ? t[0].hex : '#1A1A1A';
  const s2 = (t[1] && t[1].hex) ? t[1].hex : '#4A6741';
  const s3 = (t[2] && t[2].hex) ? t[2].hex : '#CC3300';
  const s4 = (t[3] && t[3].hex) ? t[3].hex : '#4A6741';
  const s5 = (t[4] && t[4].hex) ? t[4].hex : '#CC3300';
  const s6 = (t[5] && t[5].hex) ? t[5].hex : '#1A1A1A';
  return {
    'T':s1,'B':s1,'A':s1,'F':s1,
    'D':s2,'G':s2,
    'E':s3,'S':s3,
    'H':s4,'I':s4,
    'J':s5,'K':s5,
    'L':s6,'M':s6,
  }[kind] || s1;
}

// ── Thread length calculator ──────────────────────────────────────────────────
// Builds the grid and counts stitches per thread slot.
// Formula: stitch_count × cm_per_stitch × 1.15 waste factor, rounded to 5cm.
// cm_per_stitch = 2.5cm × strands (default 2 strands on 14-count Aida = 5cm per stitch)
function calculateThreadLengths(word, cols, rows, borderStyle, threads, textScale, strands) {
  const strandsCount = strands || 2;
  const cmPerStitch = 2.5 * strandsCount;
  const grid = buildGrid(word, cols || 94, rows || 94, borderStyle, textScale || 0, 2);
  // Map cell kinds to thread slot index (0-based), extended to 6 slots
  const kindToSlot = {
    'T':0,'B':0,'A':0,'F':0,
    'D':1,'G':1,
    'E':2,'S':2,
    'H':3,'I':3,
    'J':4,'K':4,
    'L':5,'M':5,
  };
  const counts = [0, 0, 0, 0, 0, 0];
  grid.forEach(function(row) {
    row.forEach(function(kind) {
      if (kind in kindToSlot) counts[kindToSlot[kind]]++;
    });
  });
  const t = threads || [];
  return t.map(function(thread, i) {
    const cm = counts[i] !== undefined
      ? Math.round((counts[i] * cmPerStitch * 1.15) / 5) * 5
      : 0;
    return { dmc: thread.dmc, name: thread.name, hex: thread.hex, cm: cm };
  });
}

/* ═══════════════════════════════════════════════════════════════════
   CANVAS COMPONENT
═══════════════════════════════════════════════════════════════════ */
function CrossStitchCanvas({ word, cols, rows, borderStyle, threads, size, className, textScale, lines }) {
  const canvasRef = useRef(null);
  cols = cols||110; rows = rows||110;

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas || (!word && !lines)) return;
    const px = size||440;
    canvas.width = px; canvas.height = px;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#F0E6D3';
    ctx.fillRect(0,0,px,px);

    // Use multi-row builder if lines provided, otherwise single-word builder
    const grid = lines && lines.length > 0
      ? buildGridMulti(lines, cols, rows, borderStyle, 2)
      : buildGrid(word, cols, rows, borderStyle, textScale || 0, 2);

    // Use actual grid dimensions (may differ if buildGridMulti auto-expanded)
    const actualCols = grid[0] ? grid[0].length : cols;
    const actualRows = grid.length || rows;
    const cell = px / actualCols;
    const pad = cell * 0.1;
    const lw  = Math.max(cell * 0.24, 0.5);

    grid.forEach((rowArr,row) => rowArr.forEach((kind,col) => {
      if (kind===' ') return;
      const c = stitchColor(kind, threads);
      if (!c) return;
      const x=col*cell, y=row*cell;
      ctx.strokeStyle=c; ctx.lineWidth=lw;
      ctx.beginPath();
      ctx.moveTo(x+pad,y+pad); ctx.lineTo(x+cell-pad,y+cell-pad);
      ctx.moveTo(x+cell-pad,y+pad); ctx.lineTo(x+pad,y+cell-pad);
      ctx.stroke();
    }));

    // minor grid
    ctx.strokeStyle='rgba(0,0,0,0.07)'; ctx.lineWidth=0.3;
    for(let i=0;i<=actualCols;i++){ctx.beginPath();ctx.moveTo(i*cell,0);ctx.lineTo(i*cell,px);ctx.stroke();}
    for(let i=0;i<=actualRows;i++){ctx.beginPath();ctx.moveTo(0,i*cell);ctx.lineTo(px,i*cell);ctx.stroke();}
    // every-10
    ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=0.5;
    for(let i=0;i<=actualCols;i+=10){ctx.beginPath();ctx.moveTo(i*cell,0);ctx.lineTo(i*cell,px);ctx.stroke();}
    for(let i=0;i<=actualRows;i+=10){ctx.beginPath();ctx.moveTo(0,i*cell);ctx.lineTo(px,i*cell);ctx.stroke();}
    // frame
    ctx.strokeStyle='#1A1A1A'; ctx.lineWidth=1.5;
    ctx.strokeRect(0,0,px,px);

  }, [word, cols, rows, borderStyle, size, JSON.stringify(threads), textScale, JSON.stringify(lines)]);

  return (
    <div className={className||'canvas-full'}>
      <canvas ref={canvasRef}/>
    </div>
  );
}


// ── Multi-row grid builder ────────────────────────────────────────────────────
// lines: array of {text, scale} — max 4
// Each line independently scaled and centred horizontally.
// Lines distributed evenly in available vertical space.
function buildGridMulti(lines, cols, rows, borderStyle, gap) {
  const GAP_BASE = (gap != null && gap > 0) ? gap : 1;
  const LINE_GAP = 2; // vertical gap between lines in stitches
  cols = cols || 94;
  rows = rows || 94;

  // Auto-expand grid based on line count so lines render at scale 2 comfortably
  // Transparent to user — stored stitch count is unchanged
  const lineCount = (lines || []).slice(0, 4).filter(function(l) { return l.text && l.text.trim(); }).length;
  if      (lineCount >= 4) { cols = Math.max(cols, 104); rows = Math.max(rows, 104); }
  else if (lineCount === 3) { cols = Math.max(cols, 100); rows = Math.max(rows, 100); }
  else if (lineCount === 2) { cols = Math.max(cols, 100); rows = Math.max(rows, 100); }

  const grid = [];
  for (let r = 0; r < rows; r++) grid.push(new Array(cols).fill(' '));

  function setCell(r, c, kind) {
    if (r >= 0 && r < rows && c >= 0 && c < cols && grid[r][c] === ' ')
      grid[r][c] = kind;
  }

  const N = cols;
  const spec = (typeof borderStyle === 'object' && borderStyle !== null)
    ? borderStyle
    : (BORDER_SPECS[borderStyle] || BORDER_SPECS['minimal']);

  renderBorderSpec(spec, N, setCell);

  // Clamp to 4 lines
  const activeLines = (lines || []).slice(0, 4).filter(function(l) {
    return l.text && l.text.trim();
  });
  if (activeLines.length === 0) return grid;

  // Compute interior bounds
  const borderDepth = (spec && spec.layers) ? spec.layers.length : 2;
  const cornerInset = (spec && spec.cornerInset) ? spec.cornerInset : borderDepth + 2;
  let sideMotifW = 0;
  if (spec && spec.sideMotifs) {
    spec.sideMotifs.forEach(function(m) {
      const pos = m.position || 'all';
      if (pos === 'left-right' || pos === 'all') {
        const mw = m.pattern ? m.pattern[0].length : 0;
        sideMotifW = Math.max(sideMotifW, mw);
      }
    });
  }
  const edgeClear = sideMotifW > 0 ? cornerInset + sideMotifW + 1 : cornerInset + 2;
  const interiorW = cols - edgeClear * 2;
  const interiorH = rows - edgeClear * 2;

  // For each line, build char list and compute best scale
  const LETTER_H = 7;
  const lineData = activeLines.map(function(line) {
    const normText = (line.text.normalize ? line.text.normalize('NFC') : line.text).toUpperCase();
    const charList = normText.split('').map(function(ch) {
      if (ch in DIACRITIC_MAP) {
        const dm = DIACRITIC_MAP[ch];
        const bitmap = LETTERS[dm.base];
        if (Array.isArray(bitmap)) return { letter: bitmap, hasDiac: true, mark: dm.mark };
      }
      const direct = LETTERS[ch];
      if (Array.isArray(direct)) return { letter: direct, hasDiac: false };
      const norm = normaliseChar(ch);
      const normed = LETTERS[norm];
      if (Array.isArray(normed)) return { letter: normed, hasDiac: false };
      return { letter: LETTERS['?'], hasDiac: false };
    });
    const hasDiac = charList.some(function(c) { return c.hasDiac; });
    const diacH   = hasDiac ? 2 : 0;
    const textH   = LETTER_H + diacH;
    const totalW  = charList.reduce(function(s, c) { return s + c.letter[0].length; }, 0);
    const nChars  = charList.length;

    // Per-line available height = interiorH split across lines with gaps
    const totalLineH = activeLines.length * textH + (activeLines.length - 1) * LINE_GAP;
    const maxScaleW = totalW > 0 ? Math.floor((interiorW - GAP_BASE * (nChars - 1)) / totalW) : 1;
    // Max scale fitting vertically — each line gets equal share
    const shareH    = Math.floor((interiorH - (activeLines.length - 1) * LINE_GAP) / activeLines.length);
    const maxScaleH = Math.floor(shareH / Math.max(textH, 1));
    const maxFits   = Math.min(maxScaleW, maxScaleH);

    // Resolve scale: user setting (1=S, 0=auto, 3=L) or auto
    let S = line.scale && line.scale > 0 ? line.scale : 0;
    if (S === 0) {
      // Auto: prefer 2, drop to 1, rise to 3 for short words
      if (maxFits < 1) S = 1;
      else if (maxFits < 2) S = 1;
      else {
        const vis = charList.filter(function(c) { return c.letter !== LETTERS[' ']; }).length;
        S = (maxFits >= 3 && vis <= 3) ? 3 : 2;
      }
    }
    // Cap at what fits
    S = Math.min(S, Math.max(maxFits, 1));

    return { charList, hasDiac, diacH, textH, totalW, nChars, S };
  });

  // Total height of all rendered lines + gaps
  const totalRenderedH = lineData.reduce(function(s, d) {
    return s + d.textH * d.S;
  }, 0) + (lineData.length - 1) * LINE_GAP;

  // Start row: centre the block vertically
  let currentRow = edgeClear + Math.floor((interiorH - totalRenderedH) / 2);

  // Draw each line
  lineData.forEach(function(d) {
    const tw = d.totalW * d.S + GAP_BASE * (d.nChars - 1);
    let x = Math.floor((cols - tw) / 2);
    const letterRow = currentRow + d.diacH * d.S;

    d.charList.forEach(function(charEntry) {
      const letter = charEntry.letter;
      const lw = letter[0].length;

      // Diacritic
      if (charEntry.hasDiac && d.hasDiac) {
        const markRows = DIACRITICS[charEntry.mark](lw);
        markRows.forEach(function(rs, dr) {
          rs.split('').forEach(function(ch, dc) {
            if (ch === '1') {
              for (let sy = 0; sy < d.S; sy++)
                for (let sx = 0; sx < d.S; sx++)
                  setCell(currentRow + dr * d.S + sy, x + dc * d.S + sx, 'T');
            }
          });
        });
      }

      // Letter body
      letter.forEach(function(rs, r) {
        rs.split('').forEach(function(ch, c) {
          if (ch === '1') {
            for (let dr = 0; dr < d.S; dr++)
              for (let dc = 0; dc < d.S; dc++)
                setCell(letterRow + r * d.S + dr, x + c * d.S + dc, 'T');
          }
        });
      });

      x += lw * d.S + GAP_BASE;
    });

    currentRow += d.textH * d.S + LINE_GAP;
  });

  return grid;
}

   VALIDATION HELPERS

function validateShoutout(fields) {
  const errors = {};
  if (!fields.name || !fields.name.trim()) errors.name = 'Word or phrase is required';
  if (!fields.stitchesW || fields.stitchesW < 10 || fields.stitchesW > 300) errors.stitchesW = '10–300';
  if (!fields.stitchesH || fields.stitchesH < 10 || fields.stitchesH > 300) errors.stitchesH = '10–300';
  if (!fields.hoopW || fields.hoopW < 50 || fields.hoopW > 600) errors.hoopW = '50–600mm';
  if (!fields.hoopH || fields.hoopH < 50 || fields.hoopH > 600) errors.hoopH = '50–600mm';
  if (!fields.borderId) errors.borderId = 'Select a border style';
  return errors;
}
function validateBorder(fields) {
  const errors = {};
  if (!fields.name || !fields.name.trim()) errors.name = 'Name is required';
  if (!fields.description || !fields.description.trim()) errors.description = 'Description is required';
  return errors;
}
function hasErrors(e) { return Object.keys(e).length > 0; }

function useToast() {
  const [msg, setMsg] = useState(null);
  const show = useCallback(m => { setMsg(m); setTimeout(()=>setMsg(null),2500); }, []);
  return [msg, show];
}

function formatDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

/* ---- src/components.js ---- */
function DmcPickerSheet({ currentHex, onSelect, onClose }) {
  const [query, setQuery] = useState('');
  const inputRef = useRef(null);

  useEffect(function() {
    if (inputRef.current) inputRef.current.focus();
  }, []);

  const filtered = useMemo(function() {
    if (!query.trim()) return DMC_COLOURS;
    const q = query.toLowerCase();
    return DMC_COLOURS.filter(function(c) {
      return c.dmc.toLowerCase().includes(q) || c.name.toLowerCase().includes(q);
    });
  }, [query]);

  return (
    <div className="overlay" onClick={function(e) { if (e.target === e.currentTarget) onClose(); }}>
      <div className="dmc-sheet">
        <div className="sheet-handle"/>
        <div className="sheet-header">
          <span className="sheet-title">DMC colours</span>
          <button className="btn-icon" onClick={onClose}><Ico.Close/></button>
        </div>
        <div className="dmc-search-row">
          <input
            ref={inputRef}
            className="dmc-search"
            placeholder="Search by name or DMC number…"
            value={query}
            onChange={function(e) { setQuery(e.target.value); }}
          />
        </div>
        <div className="dmc-grid">
          {filtered.length === 0 && (
            <div className="dmc-empty">No colours found for "{query}"</div>
          )}
          {filtered.map(function(c, i) {
            const isSelected = c.hex.toLowerCase() === currentHex.toLowerCase();
            return (
              <div
                key={c.dmc + '-' + i}
                className={'dmc-swatch' + (isSelected ? ' selected' : '')}
                style={{background: c.hex, border: c.hex === '#FFFFFF' || c.hex === '#FFFFF0' || c.hex === '#FFF8B0' ? '2px solid #e0e0e0' : undefined}}
                onClick={function() { onSelect(c); onClose(); }}
                title={c.dmc + ' — ' + c.name}
              >
                <div className="dmc-swatch-tip">{c.dmc} {c.name}</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   THREAD ROW (form sub-component)
═══════════════════════════════════════════════════════════════════ */
function ThreadRow({ thread, onChange, onRemove, lengthCm, slotIndex }) {
  const [pickerOpen, setPickerOpen] = useState(false);
  const slot = THREAD_SLOTS[slotIndex] || null;
  return (
    <>
      {slot && (
        <div className="thread-slot-label">
          <span className="thread-slot-name">{slot.label}</span>
          <span className="thread-slot-hint">{slot.hint}</span>
        </div>
      )}
      <div className="thread-row">
        <button className="thread-color-btn" style={{background:thread.hex}}
          onClick={function() { setPickerOpen(true); }}
          title="Pick DMC colour"/>
        <input className="form-input" placeholder="Name" value={thread.name}
          onChange={function(e) { onChange({...thread, name:e.target.value}); }}/>
        <input className="form-input" placeholder="DMC code" value={thread.dmc}
          onChange={function(e) { onChange({...thread, dmc:e.target.value}); }}/>
        <div className="thread-length" title="Estimated thread length">
          {lengthCm != null ? '~' + lengthCm + ' cm' : '—'}
        </div>
        <button className="thread-remove" onClick={onRemove}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      {pickerOpen && (
        <DmcPickerSheet
          currentHex={thread.hex}
          onSelect={function(c) {
            onChange({...thread, hex:c.hex, dmc:'DMC '+c.dmc, name:thread.name || c.name});
          }}
          onClose={function() { setPickerOpen(false); }}
        />
      )}
    </>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   BORDER PICKER (used inside shoutout form)
═══════════════════════════════════════════════════════════════════ */
function BorderPicker({ borders, selected, onSelect }) {
  return (
    <div className="border-picker">
      {borders.map(b => (
        <div key={b.id}
          className={'border-option' + (selected===b.id?' selected':'')}
          onClick={()=>onSelect(b.id, b.name)}>
          <div className="border-option-thumb">
            <CrossStitchCanvas word="ABC" cols={94} rows={94}
              borderStyle={b.spec || b.style} threads={DEFAULT_THREADS} size={88}/>
          </div>
          <div className="border-option-label">{b.name}</div>
        </div>
      ))}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   SHOUTOUT FORM
═══════════════════════════════════════════════════════════════════ */
function ShoutoutForm({ initial, borders, onSave, onClose, saving }) {
  const isEdit = !!initial;
  const [name,      setName]      = useState(initial?initial.name:'');
  const [stitchesW, setStitchesW] = useState(initial?initial.stitchesW:94);
  const [stitchesH, setStitchesH] = useState(initial?initial.stitchesH:94);
  const [hoopW,     setHoopW]     = useState(initial?initial.hoopW:280);
  const [hoopH,     setHoopH]     = useState(initial?initial.hoopH:250);
  const [notes,     setNotes]     = useState(initial?initial.notes:'');
  const [borderId,  setBorderId]  = useState(initial?initial.borderId:'');
  const [borderName,setBorderName]= useState(initial?initial.borderName:'');
  const [threads,   setThreads]   = useState(
    initial&&initial.threads&&initial.threads.length>0 ? initial.threads : DEFAULT_THREADS
  );
  const [threadLengths, setThreadLengths] = useState(initial&&initial.threadLengths ? initial.threadLengths : []);
  const [calculating,   setCalculating]   = useState(false);
  const [strands,       setStrands]       = useState(initial&&initial.strands ? initial.strands : 2);
  const [textScale,     setTextScale]     = useState(initial&&initial.textScale ? initial.textScale : 0);
  const [errors, setErrors] = useState({});
  const [touched, setTouched] = useState({});

  function touch(field) { setTouched(p=>({...p,[field]:true})); }

  function updateThread(i,u) { setThreads(p=>p.map((t,idx)=>idx===i?u:t)); }
  function removeThread(i)   { setThreads(p=>p.filter((_,idx)=>idx!==i)); }
  function addThread()       { setThreads(p=>[...p,{id:Date.now(),name:'',dmc:'',hex:'#666666',usage:''}]); }

  function handleRecalculate() {
    if (!name.trim() || !borderId) return;
    setCalculating(true);
    const border = borders.find(function(b) { return b.id === borderId; });
    const borderSpec = border && (border.spec || BORDER_SPECS[border.style]);
    setTimeout(function() {
      const lengths = calculateThreadLengths(name, +stitchesW, +stitchesH, borderSpec, threads, textScale, strands);
      setThreadLengths(lengths);
      setCalculating(false);
    }, 0);
  }

  function getLengthCm(i) {
    const entry = threadLengths[i];
    return entry ? entry.cm : null;
  }

  function handleSave() {
    const fields = {name,stitchesW:+stitchesW,stitchesH:+stitchesH,
      hoopW:+hoopW,hoopH:+hoopH,notes,borderId,borderName,threads,textScale,strands};
    const errs = validateShoutout(fields);
    setErrors(errs);
    setTouched({name:true,stitchesW:true,stitchesH:true,hoopW:true,hoopH:true,borderId:true});
    if (hasErrors(errs)) return;
    const border = borders.find(function(b) { return b.id === borderId; });
    const borderSpec = border && (border.spec || BORDER_SPECS[border.style]);
    const lengths = calculateThreadLengths(name, +stitchesW, +stitchesH, borderSpec, threads, textScale, strands);
    setThreadLengths(lengths);
    onSave({...fields, threadLengths: lengths});
  }

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="sheet">
        <div className="sheet-handle"/>
        <div className="sheet-header">
          <span className="sheet-title">{isEdit?'Edit shoutout':'New shoutout'}</span>
          <button className="btn-icon" onClick={onClose}><Ico.Close/></button>
        </div>
        <div className="sheet-body">

          <div className="form-group">
            <label className="form-label">Word or phrase</label>
            <input className={'form-input'+(touched.name&&errors.name?' error':'')}
              placeholder="e.g. GOAL!" value={name}
              onChange={e=>setName(e.target.value)}
              onBlur={()=>touch('name')} autoFocus/>
            {touched.name&&errors.name && <div className="form-error">{errors.name}</div>}
          </div>

          <div className="form-group">
            <label className="form-label">Text size</label>
            <div className="size-toggle">
              {[{label:'Small', value:1},{label:'Normal', value:0},{label:'Large', value:3}].map(function(opt) {
                return (
                  <button key={opt.label}
                    className={'size-btn' + (textScale === opt.value ? ' active' : '')}
                    onClick={function() { setTextScale(opt.value); }}>
                    {opt.label}
                  </button>
                );
              })}
            </div>
            <div className="form-hint">
              {textScale === 0 ? 'Auto — best fit for the word' :
               textScale === 1 ? 'Small — fits longer words' :
               'Large — bold impact for short words'}
            </div>
          </div>

          <div className="form-group">
            <label className="form-label">Border style</label>
            <BorderPicker borders={borders} selected={borderId}
              onSelect={(id,nm)=>{setBorderId(id);setBorderName(nm);touch('borderId');}}/>
            {touched.borderId&&errors.borderId && <div className="form-error">{errors.borderId}</div>}
          </div>

          <div className="form-group">
            <label className="form-label">Stitch count</label>
            <div className="form-row">
              <div>
                <input type="number" className={'form-input'+(touched.stitchesW&&errors.stitchesW?' error':'')}
                  value={stitchesW} onChange={e=>setStitchesW(e.target.value)} onBlur={()=>touch('stitchesW')}/>
                <div className={touched.stitchesW&&errors.stitchesW?'form-error':'form-hint'}>
                  {touched.stitchesW&&errors.stitchesW?errors.stitchesW:'Width (stitches)'}
                </div>
              </div>
              <div>
                <input type="number" className={'form-input'+(touched.stitchesH&&errors.stitchesH?' error':'')}
                  value={stitchesH} onChange={e=>setStitchesH(e.target.value)} onBlur={()=>touch('stitchesH')}/>
                <div className={touched.stitchesH&&errors.stitchesH?'form-error':'form-hint'}>
                  {touched.stitchesH&&errors.stitchesH?errors.stitchesH:'Height (stitches)'}
                </div>
              </div>
            </div>
          </div>

          <div className="form-group">
            <label className="form-label">Hoop size (mm)</label>
            <div className="form-row">
              <div>
                <input type="number" className={'form-input'+(touched.hoopW&&errors.hoopW?' error':'')}
                  value={hoopW} onChange={e=>setHoopW(e.target.value)} onBlur={()=>touch('hoopW')}/>
                <div className={touched.hoopW&&errors.hoopW?'form-error':'form-hint'}>
                  {touched.hoopW&&errors.hoopW?errors.hoopW:'Width (mm)'}
                </div>
              </div>
              <div>
                <input type="number" className={'form-input'+(touched.hoopH&&errors.hoopH?' error':'')}
                  value={hoopH} onChange={e=>setHoopH(e.target.value)} onBlur={()=>touch('hoopH')}/>
                <div className={touched.hoopH&&errors.hoopH?'form-error':'form-hint'}>
                  {touched.hoopH&&errors.hoopH?errors.hoopH:'Height (mm)'}
                </div>
              </div>
            </div>
          </div>

          <div className="form-group">
            <div className="form-label-row">
              <label className="form-label">Threads</label>
              <div style={{display:'flex', alignItems:'center', gap:8}}>
                <div className="size-toggle" style={{fontSize:11}}>
                  {[1,2,3].map(function(n) {
                    return (
                      <button key={n}
                        className={'size-btn' + (strands === n ? ' active' : '')}
                        style={{padding:'4px 10px', fontSize:11}}
                        onClick={function() { setStrands(n); }}
                        title={n + ' strand' + (n > 1 ? 's' : '')}>
                        {n}
                      </button>
                    );
                  })}
                </div>
                <span style={{fontSize:11, color:'var(--grey)'}}>strands</span>
                <button className="btn btn-ghost btn-sm" onClick={handleRecalculate}
                  disabled={calculating || !name.trim() || !borderId}>
                  {calculating ? 'Calculating…' : 'Recalculate'}
                </button>
              </div>
            </div>
            <div className="thread-list">
              {threads.map((t,i)=>(
                <ThreadRow key={t.id||i} thread={t}
                  onChange={u=>updateThread(i,u)} onRemove={()=>removeThread(i)}
                  lengthCm={getLengthCm(i)} slotIndex={i}/>
              ))}
            </div>
            <button className="add-thread-btn" onClick={addThread}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              Add thread
            </button>
          </div>

          <div className="form-group">
            <label className="form-label">Notes</label>
            <textarea className="form-textarea" placeholder="Any notes about this shoutout…"
              value={notes} onChange={e=>setNotes(e.target.value)}/>
          </div>

          <div className="form-actions">
            <button className="btn btn-outlined" onClick={onClose}>Cancel</button>
            <button className="btn btn-coral" onClick={handleSave} disabled={saving}>
              {saving?'Saving…':isEdit?'Save changes':'Create shoutout'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   PDF ENGINE
═══════════════════════════════════════════════════════════════════ */

// PT per mm (jsPDF uses pt internally, 1mm = 2.8346pt)
const MM = 2.8346;
const A4W = 210 * MM;   // 595pt
const A4H = 297 * MM;   // 841pt

// Stitch colour lookup — position-based, mirrors canvas stitchColor exactly
// Thread 1 (index 0) = text, Thread 2 (index 1) = border primary, Thread 3 (index 2) = border accent
function pdfStitchColor(kind, threads) {
  const t = threads || [];
  const s1 = (t[0] && t[0].hex) ? t[0].hex : '#1A1A1A';
  const s2 = (t[1] && t[1].hex) ? t[1].hex : '#4A6741';
  const s3 = (t[2] && t[2].hex) ? t[2].hex : '#CC3300';
  const s4 = (t[3] && t[3].hex) ? t[3].hex : '#4A6741';
  const s5 = (t[4] && t[4].hex) ? t[4].hex : '#CC3300';
  const s6 = (t[5] && t[5].hex) ? t[5].hex : '#1A1A1A';
  return {
    'T':s1,'B':s1,'A':s1,'F':s1,
    'D':s2,'G':s2,
    'E':s3,'S':s3,
    'H':s4,'I':s4,
    'J':s5,'K':s5,
    'L':s6,'M':s6,
  }[kind] || s1;
}

function hexToRgb(hex) {
  const h = hex.replace('#','');
  return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
}

// Draw the stitch grid onto a jsPDF doc at given origin/cellSize
function drawGridOnPDF(doc, grid, cols, rows, originX, originY, cellPt, threads, showBg) {
  // Background
  if (showBg) {
    doc.setFillColor(240, 230, 211); // linen #F0E6D3
    doc.rect(originX, originY, cols*cellPt, rows*cellPt, 'F');
  }

  // Stitches
  const pad = cellPt * 0.1;
  grid.forEach(function(rowArr, row) {
    rowArr.forEach(function(kind, col) {
      if (kind === ' ') return;
      const cv = pdfStitchColor(kind, threads);
      if (!cv) return;
      const rgb = hexToRgb(cv);
      const x = originX + col * cellPt;
      const y = originY + row * cellPt;
      doc.setDrawColor(rgb[0], rgb[1], rgb[2]);
      doc.setLineWidth(Math.max(cellPt * 0.22, 0.3));
      doc.line(x+pad, y+pad, x+cellPt-pad, y+cellPt-pad);
      doc.line(x+cellPt-pad, y+pad, x+pad, y+cellPt-pad);
    });
  });

  // Minor grid lines
  doc.setDrawColor(200, 200, 200);
  doc.setLineWidth(0.1);
  for (let i=0; i<=cols; i++) {
    doc.line(originX+i*cellPt, originY, originX+i*cellPt, originY+rows*cellPt);
  }
  for (let i=0; i<=rows; i++) {
    doc.line(originX, originY+i*cellPt, originX+cols*cellPt, originY+i*cellPt);
  }

  // Every-10 lines
  doc.setDrawColor(160, 160, 160);
  doc.setLineWidth(0.4);
  for (let i=0; i<=cols; i+=10) {
    doc.line(originX+i*cellPt, originY, originX+i*cellPt, originY+rows*cellPt);
  }
  for (let i=0; i<=rows; i+=10) {
    doc.line(originX, originY+i*cellPt, originX+cols*cellPt, originY+i*cellPt);
  }

  // Outer frame
  doc.setDrawColor(26, 26, 26);
  doc.setLineWidth(1.2);
  doc.rect(originX, originY, cols*cellPt, rows*cellPt, 'S');
}

// ── Chart PDF (branded A4) ────────────────────────────────────────────────────
function generateChartPDF(shoutout) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'pt', format:'a4' });

  const cols = shoutout.stitchesW || 94;
  const rows = shoutout.stitchesH || 94;
  const threads = shoutout.threads || [];
  const bs = shoutout.borderSpec || shoutout.borderStyle || 'british';
  const grid = buildGrid(shoutout.name, cols, rows, bs, 0, 2); // 0 = auto-scale

  const MARGIN_X = 14 * MM;
  const HEADER_H = 16 * MM;
  const FOOTER_H = 12 * MM;
  const LEGEND_H = 28 * MM;
  const AXIS_H   = 5  * MM;
  const SUB_H    = 7  * MM;
  const CONTENT_TOP    = A4H - HEADER_H;
  const CONTENT_BOTTOM = FOOTER_H;
  const CONTENT_H = CONTENT_TOP - CONTENT_BOTTOM;
  const GRID_SIZE = A4W - 2 * MARGIN_X;
  const BLOCK_H   = SUB_H + GRID_SIZE + AXIS_H + LEGEND_H;
  const PAD       = (CONTENT_H - BLOCK_H) / 2;
  const GRID_X    = MARGIN_X;
  const GRID_Y    = CONTENT_BOTTOM + PAD + LEGEND_H + AXIS_H;
  const CELL      = GRID_SIZE / cols;

  // ── Page background ──
  doc.setFillColor(245, 245, 245);
  doc.rect(0, 0, A4W, A4H, 'F');

  // ── Header (linen bar) ──
  doc.setFillColor(240, 230, 211);
  doc.rect(0, 0, A4W, HEADER_H, 'F');
  doc.setDrawColor(26, 26, 26);
  doc.setLineWidth(0.8);
  doc.line(0, HEADER_H, A4W, HEADER_H);

  // Wordmark
  const midY = HEADER_H / 2;
  doc.setFontSize(13); doc.setTextColor(26, 26, 26);
  doc.setFont('helvetica','bold');
  const wNutmeg = doc.getTextWidth('Nutmeg');
  const wAmp    = doc.getTextWidth('&');
  doc.text('Nutmeg', MARGIN_X, midY + 4);
  doc.setTextColor(204, 51, 0);
  doc.text('&', MARGIN_X + wNutmeg, midY + 4);
  doc.setTextColor(26, 26, 26);
  doc.text('Needle', MARGIN_X + wNutmeg + wAmp, midY + 4);
  // Tagline
  doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.setTextColor(74, 103, 65);
  doc.text('Handcrafted football moves', MARGIN_X + wNutmeg + wAmp + doc.getTextWidth('Needle') + 5*MM, midY + 3);
  // Pattern title right
  doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(26,26,26);
  const titleStr = shoutout.name + '  —  Cross-stitch pattern';
  doc.text(titleStr, A4W - MARGIN_X - doc.getTextWidth(titleStr), midY + 3);

  // ── Footer ──
  doc.setFillColor(240, 230, 211);
  doc.rect(0, A4H - FOOTER_H, A4W, FOOTER_H, 'F');
  doc.setDrawColor(26, 26, 26); doc.setLineWidth(0.8);
  doc.line(0, A4H - FOOTER_H, A4W, A4H - FOOTER_H);
  const fMidY = A4H - FOOTER_H/2;
  doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(26,26,26);
  const wFN = doc.getTextWidth('Nutmeg');
  doc.text('Nutmeg', MARGIN_X, fMidY + 3);
  doc.setTextColor(204,51,0);
  doc.text('&', MARGIN_X + wFN, fMidY + 3);
  doc.setTextColor(26,26,26);
  doc.text('Needle', MARGIN_X + wFN + doc.getTextWidth('&'), fMidY + 3);
  doc.setFont('helvetica','normal'); doc.setTextColor(102,102,102);
  const urlStr = 'nutmegneedle.com';
  doc.text(urlStr, A4W - MARGIN_X - doc.getTextWidth(urlStr), fMidY + 3);
  doc.setFontSize(7); doc.setTextColor(153,153,153);
  doc.text('1', A4W/2 - doc.getTextWidth('1')/2, fMidY + 2.5);

  // ── Subtitle ──
  const subY = A4H - HEADER_H - PAD - BLOCK_H + SUB_H - 2;
  doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(102,102,102);
  const subStr = cols + ' × ' + rows + ' stitches  ·  14-count Aida  ·  ~' +
    Math.round(cols/5.51) + ' × ' + Math.round(rows/5.51) + 'mm finished  ·  fits ' +
    shoutout.hoopW + ' × ' + shoutout.hoopH + 'mm hoop';
  doc.text(subStr, GRID_X, subY);

  // ── Grid ──
  drawGridOnPDF(doc, grid, cols, rows, GRID_X, GRID_Y, CELL, threads, true);

  // ── Axis labels ──
  doc.setFontSize(5); doc.setTextColor(153,153,153);
  for (let i=0; i<=cols; i+=10) {
    doc.text(String(i), GRID_X + i*CELL, GRID_Y + rows*CELL + 4, {align:'center'});
  }

  // ── Legend ──
  const legTopY   = GRID_Y - AXIS_H - 2;
  const legLabelY = legTopY - 5;
  doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(26,26,26);
  doc.text('Thread key', GRID_X, legLabelY);
  doc.setDrawColor(204,204,204); doc.setLineWidth(0.4);
  doc.line(GRID_X, legLabelY + 2, GRID_X + 110*MM, legLabelY + 2);

  const box = 5 * MM;
  const colW = (A4W - 2*MARGIN_X) / threads.length;
  threads.forEach(function(t, idx) {
    const lx = GRID_X + idx * colW;
    const ly = legLabelY + 4;
    const rgb = hexToRgb(t.hex || '#1A1A1A');
    doc.setFillColor(rgb[0], rgb[1], rgb[2]);
    doc.rect(lx, ly, box, box, 'F');
    // X preview on swatch
    doc.setDrawColor(255,255,255); doc.setLineWidth(0.7);
    doc.line(lx+1, ly+1, lx+box-1, ly+box-1);
    doc.line(lx+box-1, ly+1, lx+1, ly+box-1);
    // Name
    doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(26,26,26);
    doc.text(t.name||'', lx + box + 2*MM, ly + 3.5);
    // DMC
    doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(74,103,65);
    doc.text(t.dmc||'', lx + box + 2*MM, ly + box - 1);
  });

  doc.save((shoutout.name||'shoutout').toLowerCase().replace(/[^a-z0-9]/g,'-') + '-chart.pdf');
}

// ── Aida Print PDF (physically accurate, centred, no branding) ───────────────
function generateAidaPDF(shoutout, showBg) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'pt', format:'a4' });

  // Always print at 94×94 for consistent 1:1 sizing on A4 Aida fabric
  // 94 stitches × 1.814mm = 170.5mm → 20mm margins each side on 210mm A4
  const PRINT_COLS = 94;
  const PRINT_ROWS = 94;

  const threads = shoutout.threads || [];
  const bs      = shoutout.borderSpec || shoutout.borderStyle || 'british';
  const grid    = buildGrid(shoutout.name, PRINT_COLS, PRINT_ROWS, bs, 0, 2);

  // Exact 1:1 physical size
  const CELL   = (25.4 / 14) * MM;        // 1.814mm per stitch in points
  const GRID_W = PRINT_COLS * CELL;        // 170.5mm
  const GRID_H = PRINT_ROWS * CELL;

  // Centre on portrait A4 — gives exactly 20mm side margins, 63mm top/bottom
  const OX = (A4W - GRID_W) / 2;
  const OY = (A4H - GRID_H) / 2;

  // White page
  doc.setFillColor(255, 255, 255);
  doc.rect(0, 0, A4W, A4H, 'F');

  // Draw grid at exact 1:1 size
  drawGridOnPDF(doc, grid, PRINT_COLS, PRINT_ROWS, OX, OY, CELL, threads, showBg);

  // ── Brand strip — just below the design ──────────────────────────────────
  const BRAND_Y = OY + GRID_H + 8 * MM;

  const WM_SIZE = 9;
  doc.setFontSize(WM_SIZE);
  doc.setFont('helvetica', 'bold');
  const wNutmeg = doc.getTextWidth('Nutmeg');
  const wAmp    = doc.getTextWidth('&');
  const wNeedle = doc.getTextWidth('Needle');
  const wWM     = wNutmeg + wAmp + wNeedle;
  doc.setFontSize(7.5);
  doc.setFont('helvetica', 'normal');
  const wUrl = doc.getTextWidth('nutmegneedle.com');
  const wDot = doc.getTextWidth('  \u00b7  ');
  const wTag = doc.getTextWidth('Handcrafted football moves');
  const wTotal = wWM + wDot + wUrl + wDot + wTag;
  let bx = A4W / 2 - wTotal / 2;

  doc.setFontSize(WM_SIZE);
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(26, 26, 26);   doc.text('Nutmeg', bx, BRAND_Y); bx += wNutmeg;
  doc.setTextColor(204, 51, 0);   doc.text('&', bx, BRAND_Y);      bx += wAmp;
  doc.setTextColor(26, 26, 26);   doc.text('Needle', bx, BRAND_Y); bx += wNeedle;
  doc.setFontSize(7.5); doc.setFont('helvetica', 'normal');
  doc.setTextColor(180, 180, 180); doc.text('  \u00b7  ', bx, BRAND_Y); bx += wDot;
  doc.setTextColor(100, 100, 100); doc.text('nutmegneedle.com', bx, BRAND_Y); bx += wUrl;
  doc.setTextColor(180, 180, 180); doc.text('  \u00b7  ', bx, BRAND_Y); bx += wDot;
  doc.setTextColor(74, 103, 65);   doc.text('Handcrafted football moves', bx, BRAND_Y);

  doc.setFontSize(5.5); doc.setFont('helvetica', 'normal');
  doc.setTextColor(200, 200, 200);
  const spec2 = shoutout.name + '  \u00b7  14-count Aida  \u00b7  ' +
    (PRINT_COLS * 25.4 / 14).toFixed(1) + '\u00d7' +
    (PRINT_ROWS * 25.4 / 14).toFixed(1) + 'mm  \u00b7  print at 100%';
  doc.text(spec2, A4W / 2 - doc.getTextWidth(spec2) / 2, BRAND_Y + 5 * MM);

  doc.save((shoutout.name || 'shoutout').toLowerCase().replace(/[^a-z0-9]/g, '-') + '-aida-print.pdf');
}

/* ═══════════════════════════════════════════════════════════════════
   AIDA PRINT OPTIONS SHEET
═══════════════════════════════════════════════════════════════════ */
function AidaOptionsSheet({ shoutout, onClose }) {
  const [showBg,    setShowBg]    = useState(true);
  const [generating,setGenerating]= useState(false);

  // Always prints at 94×94 — fixed production format
  const gridW = (94 * 25.4 / 14).toFixed(1); // 170.5mm
  const gridH = (94 * 25.4 / 14).toFixed(1);

  function handleGenerate() {
    setGenerating(true);
    setTimeout(function() {
      generateAidaPDF(shoutout, showBg);
      setGenerating(false);
      onClose();
    }, 50);
  }

  return (
    <div className="overlay overlay-center"
      onClick={function(e){ if(e.target===e.currentTarget) onClose(); }}>
      <div className="sheet" style={{maxWidth:420}}>
        <div className="sheet-handle"/>
        <div className="sheet-header">
          <span className="sheet-title">Aida print options</span>
          <button className="btn-icon" onClick={onClose}><Ico.Close/></button>
        </div>
        <div className="sheet-body">

          <div className="aida-size-note">
            <strong>Print size:</strong> {gridW} × {gridH}mm at 1:1 scale<br/>
            14-count Aida · 94 × 94 stitches · portrait A4<br/>
            Load A4 Aida sheet in printer and print at 100% — do not scale to fit.
          </div>

          <div className="aida-option-row">
            <div>
              <div className="aida-option-label">Fabric background</div>
              <div className="aida-option-hint">Linen colour fill behind stitches. Turn off to print stitch lines only on bare Aida.</div>
            </div>
            <button className={'toggle'+(showBg?' on':'')}
              onClick={function(){ setShowBg(function(v){ return !v; }); }}>
              <div className="toggle-knob"/>
            </button>
          </div>

          <div className="form-actions" style={{paddingTop:16}}>
            <button className="btn btn-outlined" onClick={onClose}>Cancel</button>
            <button className="btn btn-coral" onClick={handleGenerate} disabled={generating}>
              {generating ? 'Generating…' : 'Download PDF'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   BORDER FORM
═══════════════════════════════════════════════════════════════════ */
const STYLE_OPTIONS = ['british','scandinavian','minimal','custom'];
const TRAIT_OPTIONS = ['diagonal-check','corner-footballs','goal-posts','shot-arrows',
  'geometric','diamond-repeat','two-line-frame','single-line','floral','folk-motifs'];

// Helper: get a representative hex colour for a slot name (for tile cell preview)
function threadColorForSlot(slotName) {
  const map = {
    'primary':'#1A1A1A','secondary':'#4A6741','accent':'#CC3300',
    'border3':'#2255AA','accent1':'#AA8800','accent2':'#AA3388',
  };
  return map[slotName] || '#1A1A1A';
}

function BorderForm({ initial, onSave, onClose, saving }) {
  const isEdit = !!initial;
  const [name,   setName]   = useState(initial?initial.name:'');
  const [style,  setStyle]  = useState(initial?initial.style:'custom');
  const [desc,   setDesc]   = useState(initial?initial.description:'');
  const [traits, setTraits] = useState(initial?initial.traits:[]);
  const [errors, setErrors] = useState({});
  const [touched,setTouched]= useState({});

  // Tile pattern state — derived from existing spec or defaults
  const initSpec = initial && initial.spec ? initial.spec : null;
  const initWeight = initSpec && initSpec.borderWeight ? initSpec.borderWeight : 1;
  const initCornerFill = initSpec && initSpec.cornerFill ? initSpec.cornerFill : 'primary';
  const initLayers = initSpec && initSpec.layers ? initSpec.layers.map(function(l) {
    return { ...l, tile: l.tile || null };
  }) : [
    {line:0, type:'solid', color:'primary',   tile:null},
    {line:1, type:'solid', color:'secondary',  tile:null},
    {line:2, type:'solid', color:'accent',     tile:null},
  ];

  const [borderWeight, setBorderWeight] = useState(initWeight);
  const [cornerFill,   setCornerFill]   = useState(initCornerFill);
  const [layers,       setLayers]       = useState(initLayers);

  const COLOR_NAMES = ['primary','secondary','accent','border3','accent1','accent2'];
  const COLOR_LABELS = ['Shoutout','Border 1','Border 2','Border 3','Accent 1','Accent 2'];
  const maxLayers = borderWeight === 2 ? 3 : 5;
  const TILE_SIZE = 8;

  function toggleTile(li, ci) {
    setLayers(function(prev) {
      return prev.map(function(layer, idx) {
        if (idx !== li) return layer;
        const current = layer.tile || '00000000';
        const arr = current.split('');
        arr[ci] = arr[ci] === '1' ? '0' : '1';
        return { ...layer, tile: arr.join('') };
      });
    });
  }

  function setLayerColor(li, color) {
    setLayers(function(prev) {
      return prev.map(function(layer, idx) {
        return idx === li ? { ...layer, color } : layer;
      });
    });
  }

  function setWeightMode(w) {
    setBorderWeight(w);
    if (w === 2) {
      // Lock all tiles to solid in double mode
      setLayers(function(prev) {
        return prev.map(function(l) { return { ...l, tile: '11111111' }; });
      });
    }
  }

  function toggleTrait(t) {
    setTraits(p=>p.includes(t)?p.filter(x=>x!==t):[...p,t]);
  }

  function handleSave() {
    const fields = {name,style,description:desc,traits};
    const errs = validateBorder(fields);
    setErrors(errs); setTouched({name:true,description:true});
    if (hasErrors(errs)) return;
    // Build updated spec preserving existing spec fields (motifs, overrides etc)
    const baseSpec = initSpec || {};
    const activeLayers = layers.slice(0, maxLayers).map(function(l, i) {
      return { line: i, type: l.type || 'solid', color: l.color || 'primary',
               tile: (l.tile && l.tile !== '11111111') ? l.tile : undefined };
    });
    const newSpec = { ...baseSpec, layers: activeLayers, borderWeight, cornerFill };
    onSave({ ...fields, spec: newSpec });
  }

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="sheet sheet-wide">
        <div className="sheet-handle"/>
        <div className="sheet-header">
          <span className="sheet-title">{isEdit?'Edit border':'New border'}</span>
          <button className="btn-icon" onClick={onClose}><Ico.Close/></button>
        </div>
        <div className="sheet-body">

          <div className="form-group">
            <label className="form-label">Border name</label>
            <input className={'form-input'+(touched.name&&errors.name?' error':'')}
              placeholder="e.g. Nordic Diamonds" value={name}
              onChange={e=>setName(e.target.value)} onBlur={()=>setTouched(p=>({...p,name:true}))}
              autoFocus/>
            {touched.name&&errors.name && <div className="form-error">{errors.name}</div>}
          </div>

          <div className="form-group">
            <label className="form-label">Description</label>
            <textarea className={'form-textarea'+(touched.description&&errors.description?' error':'')}
              placeholder="Describe the visual character and tradition of this border…"
              value={desc} onChange={e=>setDesc(e.target.value)}
              onBlur={()=>setTouched(p=>({...p,description:true}))}/>
            {touched.description&&errors.description &&
              <div className="form-error">{errors.description}</div>}
          </div>

          {/* Stitch width toggle */}
          <div className="form-group">
            <label className="form-label">Stitch width</label>
            <div className="size-toggle">
              {[{label:'Single', value:1},{label:'Double', value:2}].map(function(opt) {
                return (
                  <button key={opt.label}
                    className={'size-btn' + (borderWeight === opt.value ? ' active' : '')}
                    onClick={function() { setWeightMode(opt.value); }}>
                    {opt.label}
                  </button>
                );
              })}
            </div>
            <div className="form-hint">
              {borderWeight === 2 ? 'Double stitch — max 3 layers, beginner friendly' : 'Single stitch — up to 5 layers, full pattern control'}
            </div>
          </div>

          {/* Tile pattern editor */}
          <div className="form-group">
            <label className="form-label">Layer patterns</label>
            <div className="form-hint" style={{marginBottom:8}}>
              Each row = one border layer. Tap cells to create a repeating 8-stitch tile pattern.
              {borderWeight === 2 && ' Locked to solid in double-stitch mode.'}
            </div>
            <div className="tile-layer-editor">
              {layers.map(function(layer, li) {
                const muted = li >= maxLayers;
                const tile = layer.tile || '00000000';
                const locked = borderWeight === 2;
                return (
                  <div key={li} className={'tile-layer-row' + (muted ? ' layer-muted' : '')}>
                    <span className="tile-layer-num">{li+1}</span>
                    <div className="tile-editor-cells">
                      {Array.from({length: TILE_SIZE}).map(function(_, ci) {
                        const on = tile[ci] === '1';
                        const col = threadColorForSlot(layer.color);
                        return (
                          <div key={ci}
                            className={'tile-edit-cell' + (on ? ' on' : '') + (locked || muted ? ' locked' : '')}
                            style={{background: on ? col : ''}}
                            onClick={function() { if (!locked && !muted) toggleTile(li, ci); }}>
                            {on && (
                              <svg viewBox="0 0 16 16" fill="none" width="14" height="14">
                                <line x1="2" y1="2" x2="14" y2="14" stroke="white" strokeWidth="2" strokeLinecap="round"/>
                                <line x1="14" y1="2" x2="2" y2="14" stroke="white" strokeWidth="2" strokeLinecap="round"/>
                              </svg>
                            )}
                          </div>
                        );
                      })}
                    </div>
                    {/* Colour slot selector */}
                    {!muted && (
                      <div className="tile-layer-color">
                        <select className="tile-color-select"
                          value={layer.color || 'primary'}
                          onChange={function(e) { setLayerColor(li, e.target.value); }}>
                          {COLOR_NAMES.map(function(c, ci2) {
                            return <option key={c} value={c}>{COLOR_LABELS[ci2]}</option>;
                          })}
                        </select>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Corner fill */}
          <div className="form-group">
            <label className="form-label">Corner fill colour</label>
            <select className="form-input" style={{maxWidth:200}}
              value={cornerFill}
              onChange={function(e) { setCornerFill(e.target.value); }}>
              {COLOR_NAMES.map(function(c, i) {
                return <option key={c} value={c}>{COLOR_LABELS[i]}</option>;
              })}
            </select>
            <div className="form-hint">All 4 frame corners fill solid in this colour</div>
          </div>

          <div className="form-group">
            <label className="form-label">Traits</label>
            <div style={{display:'flex',flexWrap:'wrap',gap:'6px'}}>
              {TRAIT_OPTIONS.map(t=>(
                <button key={t}
                  className="btn btn-outlined"
                  style={{
                    fontSize:11,padding:'4px 10px',
                    background:traits.includes(t)?'var(--black)':'',
                    color:traits.includes(t)?'var(--white)':'',
                    borderColor:traits.includes(t)?'var(--black)':''
                  }}
                  onClick={()=>toggleTrait(t)}>{t}
                </button>
              ))}
            </div>
            <div className="form-hint">Select all that apply</div>
          </div>

          <div className="form-actions">
            <button className="btn btn-outlined" onClick={onClose}>Cancel</button>
            <button className="btn btn-coral" onClick={handleSave} disabled={saving}>
              {saving?'Saving…':isEdit?'Save changes':'Create border'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   OBJECT DETAIL + STITCH EDITOR
═══════════════════════════════════════════════════════════════════ */

// Max dimensions based on British Classic border limits
const OBJECT_MAX_W = 41; // top/bottom side motif max width
const OBJECT_MAX_H = 11; // corner motif max height (enlarged)
const OBJECT_DEFAULT_W = 9;
const OBJECT_DEFAULT_H = 9;
const EDITOR_CELL = 32; // px per stitch cell in editor

function ObjectEditor({ initial, onSave, onClose, saving }) {
  const isEdit = !!initial;
  const [name,    setName]    = useState(initial ? initial.name : '');
  const [pattern, setPattern] = useState(function() {
    if (initial && initial.pattern) return initial.pattern.map(function(r) { return r.split(''); });
    // Blank 9x9 grid
    return Array.from({length: OBJECT_DEFAULT_H}, function() {
      return Array(OBJECT_DEFAULT_W).fill('0');
    });
  });
  const [nameError, setNameError] = useState('');

  const h = pattern.length;
  const w = pattern[0] ? pattern[0].length : OBJECT_DEFAULT_W;

  function toggleCell(r, c) {
    setPattern(function(prev) {
      const next = prev.map(function(row) { return [...row]; });
      next[r][c] = next[r][c] === '1' ? '0' : '1';
      return next;
    });
  }

  function resizeGrid(newW, newH) {
    const clampW = Math.max(1, Math.min(OBJECT_MAX_W, newW));
    const clampH = Math.max(1, Math.min(OBJECT_MAX_H, newH));
    setPattern(function(prev) {
      return Array.from({length: clampH}, function(_, r) {
        return Array.from({length: clampW}, function(_, c) {
          return (prev[r] && prev[r][c]) ? prev[r][c] : '0';
        });
      });
    });
  }

  function handleSave() {
    if (!name.trim()) { setNameError('Name is required'); return; }
    setNameError('');
    const patternStrings = pattern.map(function(row) { return row.join(''); });
    onSave({ name: name.trim(), pattern: patternStrings, width: w, height: h });
  }

  return (
    <div className="overlay" onClick={function(e) { if (e.target === e.currentTarget) onClose(); }}>
      <div className="sheet sheet-wide">
        <div className="sheet-handle"/>
        <div className="sheet-header">
          <span className="sheet-title">{isEdit ? 'Edit object' : 'New object'}</span>
          <button className="btn-icon" onClick={onClose}><Ico.Close/></button>
        </div>
        <div className="sheet-body">

          <div className="form-group">
            <label className="form-label">Name</label>
            <input className={'form-input' + (nameError ? ' error' : '')}
              placeholder="e.g. Corner diamond" value={name}
              onChange={function(e) { setName(e.target.value); }} autoFocus/>
            {nameError && <div className="form-error">{nameError}</div>}
          </div>

          {/* Resize controls */}
          <div className="form-group">
            <label className="form-label">Size</label>
            <div className="object-size-row">
              <div className="object-size-field">
                <label className="form-hint">Width</label>
                <div className="object-size-stepper">
                  <button onClick={function() { resizeGrid(w-1, h); }} disabled={w <= 1}>−</button>
                  <span>{w}</span>
                  <button onClick={function() { resizeGrid(w+1, h); }} disabled={w >= OBJECT_MAX_W}>+</button>
                </div>
              </div>
              <div className="object-size-field">
                <label className="form-hint">Height</label>
                <div className="object-size-stepper">
                  <button onClick={function() { resizeGrid(w, h-1); }} disabled={h <= 1}>−</button>
                  <span>{h}</span>
                  <button onClick={function() { resizeGrid(w, h+1); }} disabled={h >= OBJECT_MAX_H}>+</button>
                </div>
              </div>
              <div className="form-hint" style={{alignSelf:'flex-end', paddingBottom:4}}>
                Max {OBJECT_MAX_W}×{OBJECT_MAX_H}
              </div>
            </div>
          </div>

          {/* Stitch editor */}
          <div className="form-group">
            <label className="form-label">Stitch editor</label>
            <div className="form-hint" style={{marginBottom:8}}>Tap a cell to toggle a stitch on or off</div>
            <div className="stitch-editor-wrap">
              <div className="stitch-editor"
                style={{
                  display: 'grid',
                  gridTemplateColumns: 'repeat(' + w + ', ' + EDITOR_CELL + 'px)',
                  gridTemplateRows: 'repeat(' + h + ', ' + EDITOR_CELL + 'px)',
                }}>
                {pattern.map(function(row, r) {
                  return row.map(function(cell, c) {
                    const on = cell === '1';
                    return (
                      <div key={r + '-' + c}
                        className={'stitch-cell' + (on ? ' on' : '')}
                        onClick={function() { toggleCell(r, c); }}>
                        {on && (
                          <svg viewBox="0 0 32 32" width={EDITOR_CELL} height={EDITOR_CELL}>
                            <line x1="4" y1="4" x2="28" y2="28" stroke="#1A1A1A" strokeWidth="3.5" strokeLinecap="round"/>
                            <line x1="28" y1="4" x2="4" y2="28" stroke="#1A1A1A" strokeWidth="3.5" strokeLinecap="round"/>
                          </svg>
                        )}
                      </div>
                    );
                  });
                })}
              </div>
            </div>
          </div>

          <div className="form-actions">
            <button className="btn btn-outlined" onClick={onClose}>Cancel</button>
            <button className="btn btn-coral" onClick={handleSave} disabled={saving}>
              {saving ? 'Saving…' : isEdit ? 'Save changes' : 'Create object'}
            </button>
          </div>
        </div>
      </div>
    </div>

  }, [shoutouts, activeFolder, query]);

  const total = activeFolder ? shoutouts.filter(function(s) { return s.folder === activeFolder; }).length : shoutouts.length;
  const showCount = query.trim() && filtered.length !== total
    ? filtered.length + ' of ' + total

  return (

              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">

              </svg>
            </button>
          )}
        </div>
      </div>

      {/* Folder pills */}
      <div className="folder-bar">
        <button className={'folder-pill' + (!activeFolder ? ' active' : '')}
          onClick={function() { onFolderChange(null); }}>All</button>
        {folders.map(function(f) {
          return (
            <div key={f} className="folder-pill-wrap">
              <button className={'folder-pill' + (activeFolder === f ? ' active' : '')}
                onClick={function() { onFolderChange(f); }}>{f}</button>
              <button className="folder-pill-menu" onClick={function(e) {
                e.stopPropagation();
                setFolderMenu(folderMenu === f ? null : f);
              }}>⋯</button>
              {folderMenu === f && (
                <div className="folder-dropdown">
                  <button onClick={function() {
                    const name = window.prompt('Rename folder:', f);
                    if (name && name.trim() && name.trim() !== f) {
                      onFolderRename('shoutouts', f, name.trim());
                    }
                    setFolderMenu(null);
                  }}>Rename</button>
                  <button className="danger" onClick={function() {
                    if (window.confirm('Delete folder "' + f + '"? Shoutouts will become unfiled.')) {
                      onFolderDelete('shoutouts', f);
                    }
                    setFolderMenu(null);
                  }}>Delete</button>
                </div>
              )}
            </div>
          );
        })}
        <button className="folder-add" onClick={function() {
          const name = window.prompt('New folder name:');
          if (name && name.trim()) onFolderCreate('shoutouts', name.trim());
        }}>+ Folder</button>
      </div>

      {/* Cards */}
      {shoutouts.length === 0 ? (
        <div className="empty">
          <span className="empty-icon">🧵</span>
          <h3>No shoutouts yet</h3>
          <p>Tap + to create your first football shoutout, or ask Claude-Kevin for ideas.</p>

        </div>

        <div className="card-grid">

            const tm = tmCache && tmCache[s.name];
            return (
              <div key={s.id} className="card" onClick={function() { onSelect(s); }}>
                {s.folder && <div className="card-folder-tag">{s.folder}</div>}

                <div className="card-sub">
                  {s.stitchesW}×{s.stitchesH} stitches · {s.hoopW}×{s.hoopH}mm
                  {s.borderName && <span> · {s.borderName}</span>}
                </div>
                {s.threads&&s.threads.length>0 && (
                  <div className="thread-chips">

            );
          })}
        </div>
      )}
    </div>
  );
}

// Small read-only stitch preview for cards
function ObjectPreview({ pattern, size }) {
  if (!pattern || pattern.length === 0) return <div className="object-preview-empty"/>;
  const h = pattern.length;
  const w = pattern[0].length;
  const cell = Math.min(Math.floor(size / Math.max(w, h)), 20);
  const pw = w * cell;
  const ph = h * cell;
  return (
    <div className="object-preview" style={{width: pw, height: ph}}>
      {pattern.map(function(row, r) {
        return row.split('').map(function(ch, c) {
          if (ch !== '1') return null;
          const x = c * cell;
          const y = r * cell;
          const pad = cell * 0.1;
          return (
            <svg key={r + '-' + c} style={{position:'absolute', left:x, top:y, width:cell, height:cell}}
              viewBox={'0 0 ' + cell + ' ' + cell}>
              <line x1={pad} y1={pad} x2={cell-pad} y2={cell-pad} stroke="#1A1A1A" strokeWidth={Math.max(cell*0.2,1)} strokeLinecap="round"/>
              <line x1={cell-pad} y1={pad} x2={pad} y2={cell-pad} stroke="#1A1A1A" strokeWidth={Math.max(cell*0.2,1)} strokeLinecap="round"/>
            </svg>
          );
        });
      })}
    </div>
  );
}
